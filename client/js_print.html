<script>
// ════════════════════════════════════════════════════════
//  js_print.html — 인쇄/PDF 선택 모달 & 프린트 오버레이
// ════════════════════════════════════════════════════════

// 주간 통합 인쇄 대상 logId 목록 — A4 한 장에 5일치가 들어가는 양식만 등록
var WEEKLY_PRINT_LOG_IDS = {
  'si0201': true,
  'si0102vs': true,
  'si0102wc': true,
  'si0102dr': true
};

var MONTHLY_PRINT_LOG_IDS = {
  'si0103': true
};

var WEEKLY_PRINT_META = {
  si0102vs: { label: '부대시설 위생점검일지 (위생전실)', location: '위생전실' },
  si0102wc: { label: '부대시설 위생점검일지 (화장실)', location: '화장실' },
  si0102dr: { label: '부대시설 위생점검일지 (탈의실)', location: '탈의실' }
};

var MONTHLY_PRINT_META = {
  si0103: { label: '영업장 위생점검 일지', location: '영업장' }
};

var printState = {
  records:     [],   // 검색된 레코드 목록
  selected:    {},   // { recordId: true }
  weekGroups:  {},   // { 'logId::YYYY-MM-DD(monday)': [rec, ...] }
  monthGroups: {},   // { 'logId::YYYY-MM': [rec, ...] }
  rangeFrom:   '',
  rangeTo:     ''
};

function isMondayDate(dateStr) {
  if (!dateStr) return false;
  var d = _printCreateUtcDate(dateStr);
  return d.getUTCDay() === 1;
}

function _printCreateUtcDate(dateStr) {
  var parts = String(dateStr || '').split('-').map(Number);
  return new Date(Date.UTC(parts[0] || 1970, (parts[1] || 1) - 1, parts[2] || 1));
}

function _printFormatUtcDate(date) {
  return date.toISOString().slice(0, 10);
}

function _printGetMonthKey(dateStr) {
  return String(dateStr || '').slice(0, 7);
}

function _printGetNextMonthStart(monthKey) {
  var d = _printCreateUtcDate(monthKey + '-01');
  d.setUTCMonth(d.getUTCMonth() + 1, 1);
  return _printFormatUtcDate(d);
}

function getPreviousWeekRange(anchorMonday) {
  var monday = _printCreateUtcDate(anchorMonday);
  monday.setUTCDate(monday.getUTCDate() - 7);
  var sunday = new Date(monday);
  sunday.setUTCDate(sunday.getUTCDate() + 6);
  return {
    from: _printFormatUtcDate(monday),
    to: _printFormatUtcDate(sunday),
  };
}

function getWeeklyPrintAvailableDate(group) {
  if (!group || !group.length) return '';
  var monday = _si0201GetMonday(group[0].date);
  var nextMondayDate = _printCreateUtcDate(monday);
  nextMondayDate.setUTCDate(nextMondayDate.getUTCDate() + 7);
  var nextMonday = _printFormatUtcDate(nextMondayDate);
  var lastApproveDate = group.reduce(function(maxDate, rec) {
    var date = rec.approverDate || rec.date || '';
    return !maxDate || date > maxDate ? date : maxDate;
  }, '');
  return lastApproveDate && lastApproveDate > nextMonday ? lastApproveDate : nextMonday;
}

function getMonthlyPrintAvailableDate(group) {
  if (!group || !group.length) return '';
  var nextMonth = _printGetNextMonthStart(_printGetMonthKey(group[0].date));
  var lastApproveDate = group.reduce(function(maxDate, rec) {
    var date = rec.approverDate || rec.date || '';
    return !maxDate || date > maxDate ? date : maxDate;
  }, '');
  return lastApproveDate && lastApproveDate > nextMonth ? lastApproveDate : nextMonth;
}

function getPeriodicCandidateRange(fromDate, toDate) {
  var start = _printCreateUtcDate(fromDate);
  start.setUTCDate(start.getUTCDate() - 400);
  return {
    from: _printFormatUtcDate(start),
    to: toDate
  };
}

function getWeekGroupKey(rec) {
  return rec.logId + '::' + _si0201GetMonday(rec.date);
}

function getWeeklyGroupLabel(group) {
  var first = group && group[0];
  if (!first) return '';
  return (WEEKLY_PRINT_META[first.logId] && WEEKLY_PRINT_META[first.logId].label) || first.title || first.logId;
}

function getMonthGroupKey(rec) {
  return rec.logId + '::' + _printGetMonthKey(rec.date);
}

function getMonthlyGroupLabel(group) {
  var first = group && group[0];
  if (!first) return '';
  return (MONTHLY_PRINT_META[first.logId] && MONTHLY_PRINT_META[first.logId].label) || first.title || first.logId;
}

function isWeeklyGroupSelectable(group) {
  var availableDate = getWeeklyPrintAvailableDate(group);
  return !!availableDate &&
    (!printState.rangeFrom || availableDate >= printState.rangeFrom) &&
    (!printState.rangeTo || availableDate <= printState.rangeTo);
}

function isMonthlyGroupSelectable(group) {
  var availableDate = getMonthlyPrintAvailableDate(group);
  return !!availableDate &&
    (!printState.rangeFrom || availableDate >= printState.rangeFrom) &&
    (!printState.rangeTo || availableDate <= printState.rangeTo);
}

// ── 인쇄 선택 모달 열기 ────────────────────────────────
function openPrintModal() {
  var today = state.serverToday || new Date().toISOString().slice(0, 10);
  var html =
    '<div style="padding:0 4px;">' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">' +
        '<div>' +
          '<label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">시작일</label>' +
          '<input type="date" id="print-from" value="' + today + '"' +
            ' style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;font-size:14px;">' +
        '</div>' +
        '<div>' +
          '<label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">종료일</label>' +
          '<input type="date" id="print-to" value="' + today + '"' +
            ' style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;font-size:14px;">' +
      '</div>' +
      '</div>' +
      '<div style="font-size:12px;color:#666;background:#f8f9fa;border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin-bottom:12px;line-height:1.5;">' +
        '주간/월간 묶음 인쇄 양식은 기간으로 조회합니다. 선택한 기간 안에 인쇄 가능일이 들어오면 인쇄 대상에 나타납니다.' +
      '</div>' +
      '<button id="search-print-btn" onclick="searchPrintRecords()" class="btn-primary" style="width:100%;margin-bottom:14px;">🔍 조회</button>' +
      '<div id="print-record-list"><p style="color:#aaa;text-align:center;padding:20px 0;">날짜를 선택하고 조회하세요.</p></div>' +
      '<div id="print-action-bar" class="hidden" style="display:flex;gap:8px;margin-top:12px;">' +
        '<button onclick="toggleSelectAllPrint()" id="print-select-all-btn"' +
          ' style="flex:1;padding:10px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;font-size:13px;">전체선택</button>' +
        '<button id="execute-print-btn" onclick="executePrint()"' +
          ' style="flex:2;padding:10px;border-radius:8px;border:none;background:var(--primary);color:white;cursor:pointer;font-size:13px;font-weight:bold;">🖨 선택 인쇄</button>' +
      '</div>' +
    '</div>';

  openModal('인쇄할 일지 선택', html);
}

// ── 레코드 조회 ────────────────────────────────────────
function searchPrintRecords() {
  var fromEl = document.getElementById('print-from');
  var toEl   = document.getElementById('print-to');
  if (!fromEl || !toEl) return;

  var from = fromEl.value;
  var to   = toEl.value;
  if (!from || !to) { showToast('날짜를 입력해주세요.', 'error'); return; }
  if (from > to)    { showToast('시작일이 종료일보다 늦습니다.', 'error'); return; }

  var listEl   = document.getElementById('print-record-list');
  var actionEl = document.getElementById('print-action-bar');
  listEl.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px 0;">조회 중...</p>';

  var factoryId = state.currentFactory || 'pb2';
  var today = state.serverToday || new Date().toISOString().slice(0, 10);
  var pending = 2;
  var individualRecords = [];
  var periodicRecords = [];
  var failed = false;

  function finish() {
    pending--;
    if (pending > 0 || failed) return;

    printState.records = individualRecords.concat(periodicRecords);
    printState.selected = {};
    printState.weekGroups = {};
    printState.monthGroups = {};
    printState.rangeFrom = from;
    printState.rangeTo = to;
    renderPrintList(listEl, actionEl);
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) {
        failed = true;
        showToast(res.message || '조회 실패', 'error');
        return;
      }
      individualRecords = (res.records || []).filter(function(rec) {
        return !WEEKLY_PRINT_LOG_IDS[rec.logId] && !MONTHLY_PRINT_LOG_IDS[rec.logId];
      });
      finish();
    })
    .withFailureHandler(function(e) {
      failed = true;
      showToast('서버 오류: ' + e.message, 'error');
    })
    .getRecordsForDateRange(factoryId, from, to);

  if (from > today) {
    periodicRecords = [];
    finish();
    return;
  }

  var periodicRange = getPeriodicCandidateRange(from, to > today ? today : to);
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) {
        failed = true;
        showToast(res.message || '조회 실패', 'error');
        return;
      }
      var weeklyGroups = {};
      var monthlyGroups = {};
      (res.records || []).forEach(function(rec) {
        if (WEEKLY_PRINT_LOG_IDS[rec.logId]) {
          var weekKey = getWeekGroupKey(rec);
          if (!weeklyGroups[weekKey]) weeklyGroups[weekKey] = [];
          weeklyGroups[weekKey].push(rec);
          return;
        }
        if (MONTHLY_PRINT_LOG_IDS[rec.logId]) {
          var monthKey = getMonthGroupKey(rec);
          if (!monthlyGroups[monthKey]) monthlyGroups[monthKey] = [];
          monthlyGroups[monthKey].push(rec);
        }
      });
      periodicRecords = [];
      var singleDay = from === to;
      var previousWeek = getPreviousWeekRange(_si0201GetMonday(from));
      Object.keys(weeklyGroups).forEach(function(weekKey) {
        var group = weeklyGroups[weekKey];
        var availableDate = getWeeklyPrintAvailableDate(group);
        var weekStart = _si0201GetMonday(group[0].date);
        var showSelectable = availableDate >= from && availableDate <= to;
        var showLocked = singleDay && weekStart === previousWeek.from;
        if (showSelectable || showLocked) {
          periodicRecords = periodicRecords.concat(group);
        }
      });
      Object.keys(monthlyGroups).forEach(function(monthKey) {
        var group = monthlyGroups[monthKey];
        var availableDate = getMonthlyPrintAvailableDate(group);
        if (availableDate >= from && availableDate <= to) {
          periodicRecords = periodicRecords.concat(group);
        }
      });
      finish();
    })
    .withFailureHandler(function(e) {
      failed = true;
      showToast('서버 오류: ' + e.message, 'error');
    })
    .getRecordsForDateRange(factoryId, periodicRange.from, periodicRange.to);
}

// ── 레코드 목록 렌더링 ─────────────────────────────────
function renderPrintList(listEl, actionEl) {
  var recs = printState.records;
  if (!recs.length) {
    listEl.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px 0;">\uD574\uB2F9 \uAE30\uAC04 \uC2B9\uC778\uC644\uB8CC \uC77C\uC9C0\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.</p>';
    if (actionEl) actionEl.classList.add('hidden');
    return;
  }

  var weeklyRecs = [];
  var monthlyRecs = [];
  var individualRecs = [];
  recs.forEach(function(rec) {
    if (WEEKLY_PRINT_LOG_IDS[rec.logId]) weeklyRecs.push(rec);
    else if (MONTHLY_PRINT_LOG_IDS[rec.logId]) monthlyRecs.push(rec);
    else individualRecs.push(rec);
  });

  var weekGroups = {};
  weeklyRecs.forEach(function(rec) {
    var weekKey = getWeekGroupKey(rec);
    if (!weekGroups[weekKey]) weekGroups[weekKey] = [];
    weekGroups[weekKey].push(rec);
  });
  printState.weekGroups = weekGroups;

  var monthGroups = {};
  monthlyRecs.forEach(function(rec) {
    var monthKey = getMonthGroupKey(rec);
    if (!monthGroups[monthKey]) monthGroups[monthKey] = [];
    monthGroups[monthKey].push(rec);
  });
  printState.monthGroups = monthGroups;

  var statusColor = {
    '\uC791\uC131\uC911':'var(--warning)',
    '\uC791\uC131\uC644\uB8CC':'var(--status-write)',
    '\uAC80\uD1A0\uC644\uB8CC':'var(--status-review)',
    '\uC2B9\uC778\uC644\uB8CC':'var(--success)'
  };
  var html = '<div style="display:flex;flex-direction:column;gap:8px;">';

  if (Object.keys(weekGroups).length) {
    html +=
      '<div style="padding:10px 12px;border:1px solid #d6eaf8;background:#f4fbff;border-radius:8px;font-size:12px;color:#2874a6;">' +
        '\uC8FC\uAC04 \uC591\uC2DD\uC740 \uC120\uD0DD\uD55C \uAE30\uAC04 \uC548\uC5D0 \uC778\uC1C4 \uAC00\uB2A5\uC77C\uC774 \uD3EC\uD568\uB418\uBA74 \uC870\uD68C\uB429\uB2C8\uB2E4. \uC778\uC1C4 \uAC00\uB2A5\uC77C\uC740 \uB2E4\uC74C \uC8FC \uC6D4\uC694\uC77C\uACFC \uCD5C\uC885 \uC2B9\uC778\uC77C \uC911 \uB354 \uB2A6\uC740 \uB0A0\uC9DC\uC785\uB2C8\uB2E4.' +
      '</div>';
  }

  if (Object.keys(monthGroups).length) {
    html +=
      '<div style="padding:10px 12px;border:1px solid #d5f5e3;background:#f3fff8;border-radius:8px;font-size:12px;color:#1d8348;">' +
        '월간 묶음 인쇄 양식은 다음 달 1일과 최종 승인일 중 더 늦은 날짜부터 조회됩니다.' +
      '</div>';
  }

  Object.keys(weekGroups).sort().forEach(function(weekKey) {
    var group = weekGroups[weekKey];
    var availableDate = getWeeklyPrintAvailableDate(group);
    var isSelectable = isWeeklyGroupSelectable(group);
    var dates = group.map(function(r) { return r.date; }).sort();
    var rangeLabel = dates[0].slice(5) + ' ~ ' + dates[dates.length - 1].slice(5);
    var countLabel = group.length + '\uAC74 \uC2B9\uC778\uC644\uB8CC';
    var title = getWeeklyGroupLabel(group);

    if (!isSelectable) {
      html +=
        '<div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;">' +
          '<span style="font-size:18px;">\uD83D\uDD12</span>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-size:13px;font-weight:600;color:#666;">' + title + ' (' + rangeLabel + ')</div>' +
            '<div style="font-size:11px;color:#888;margin-top:2px;">' + countLabel + ' \u00B7 \uC778\uC1C4 \uAC00\uB2A5\uC77C: ' + availableDate + '</div>' +
          '</div>' +
          '<span style="font-size:11px;color:#999;white-space:nowrap;">\uC120\uD0DD\uC77C \uBD88\uC77C\uCE58</span>' +
        '</div>';
      return;
    }

    var groupChecked = group.every(function(r) { return printState.selected[r.recordId]; });
    html +=
      '<label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #eee;border-radius:8px;cursor:pointer;background:#fff;">' +
        '<input type="checkbox" ' + (groupChecked ? 'checked' : '') +
          ' onchange="toggleWeekGroupSelect(\'' + weekKey + '\',this.checked)"' +
          ' style="width:18px;height:18px;cursor:pointer;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:13px;font-weight:600;color:#2c3e50;">' + title + ' (' + rangeLabel + ')</div>' +
          '<div style="font-size:11px;color:#888;margin-top:2px;">' + countLabel + ' \u00B7 \uC778\uC1C4 \uAC00\uB2A5\uC77C: ' + availableDate + '</div>' +
        '</div>' +
        '<span style="font-size:11px;font-weight:bold;color:var(--success);white-space:nowrap;">\uC778\uC1C4 \uAC00\uB2A5</span>' +
      '</label>';
  });

  Object.keys(monthGroups).sort().forEach(function(monthKey) {
    var group = monthGroups[monthKey];
    var availableDate = getMonthlyPrintAvailableDate(group);
    var isSelectable = isMonthlyGroupSelectable(group);
    var monthLabel = monthKey.split('::')[1];
    var countLabel = group.length + '건 승인완료';
    var title = getMonthlyGroupLabel(group);

    if (!isSelectable) {
      html +=
        '<div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;">' +
          '<span style="font-size:18px;">🔒</span>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-size:13px;font-weight:600;color:#666;">' + title + ' (' + monthLabel + ')</div>' +
            '<div style="font-size:11px;color:#888;margin-top:2px;">' + countLabel + ' · 인쇄 가능일: ' + availableDate + '</div>' +
          '</div>' +
          '<span style="font-size:11px;color:#999;white-space:nowrap;">선택일 불일치</span>' +
        '</div>';
      return;
    }

    var groupChecked = group.every(function(r) { return printState.selected[r.recordId]; });
    html +=
      '<label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #eee;border-radius:8px;cursor:pointer;background:#fff;">' +
        '<input type="checkbox" ' + (groupChecked ? 'checked' : '') +
          ' onchange="toggleMonthGroupSelect(\'' + monthKey + '\',this.checked)"' +
          ' style="width:18px;height:18px;cursor:pointer;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:13px;font-weight:600;color:#2c3e50;">' + title + ' (' + monthLabel + ')</div>' +
          '<div style="font-size:11px;color:#888;margin-top:2px;">' + countLabel + ' · 인쇄 가능일: ' + availableDate + '</div>' +
        '</div>' +
        '<span style="font-size:11px;font-weight:bold;color:var(--success);white-space:nowrap;">인쇄 가능</span>' +
      '</label>';
  });

  individualRecs.forEach(function(rec) {
    var checked = printState.selected[rec.recordId] ? 'checked' : '';
    var color = statusColor[rec.status] || '#888';
    html +=
      '<label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #eee;border-radius:8px;cursor:pointer;background:#fff;">' +
        '<input type="checkbox" ' + checked + ' onchange="togglePrintSelect(\'' + rec.recordId + '\',this.checked)"' +
          ' style="width:18px;height:18px;cursor:pointer;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:13px;font-weight:600;color:#2c3e50;">' + rec.title + '</div>' +
          '<div style="font-size:11px;color:#888;margin-top:2px;">' + rec.date + ' \u00B7 ' + rec.writerName + '</div>' +
        '</div>' +
        '<span style="font-size:11px;font-weight:bold;color:' + color + ';white-space:nowrap;">' + rec.status + '</span>' +
      '</label>';
  });

  html += '</div>';
  listEl.innerHTML = html;
  if (actionEl) actionEl.classList.remove('hidden');
}

function togglePrintSelect(recordId, checked) {
  if (checked) printState.selected[recordId] = true;
  else delete printState.selected[recordId];
}

function toggleWeekGroupSelect(weekKey, checked) {
  var group = (printState.weekGroups || {})[weekKey] || [];
  group.forEach(function(rec) {
    if (checked) printState.selected[rec.recordId] = true;
    else delete printState.selected[rec.recordId];
  });
}

function toggleMonthGroupSelect(monthKey, checked) {
  var group = (printState.monthGroups || {})[monthKey] || [];
  group.forEach(function(rec) {
    if (checked) printState.selected[rec.recordId] = true;
    else delete printState.selected[rec.recordId];
  });
}

function toggleSelectAllPrint() {
  var selectableIds = [];
  Object.keys(printState.weekGroups || {}).forEach(function(weekKey) {
    var group = printState.weekGroups[weekKey] || [];
    if (!isWeeklyGroupSelectable(group)) return;
    group.forEach(function(rec) {
      selectableIds.push(rec.recordId);
    });
  });
  Object.keys(printState.monthGroups || {}).forEach(function(monthKey) {
    var group = printState.monthGroups[monthKey] || [];
    if (!isMonthlyGroupSelectable(group)) return;
    group.forEach(function(rec) {
      selectableIds.push(rec.recordId);
    });
  });
  printState.records.forEach(function(rec) {
    if (!WEEKLY_PRINT_LOG_IDS[rec.logId] && !MONTHLY_PRINT_LOG_IDS[rec.logId]) selectableIds.push(rec.recordId);
  });

  var allSelected = selectableIds.length > 0 && selectableIds.every(function(id) { return printState.selected[id]; });
  if (allSelected) {
    printState.selected = {};
  } else {
    selectableIds.forEach(function(id) { printState.selected[id] = true; });
  }

  var listEl = document.getElementById('print-record-list');
  var actionEl = document.getElementById('print-action-bar');
  renderPrintList(listEl, actionEl);
}
function executePrint() {
  var selectedIds = Object.keys(printState.selected);
  if (!selectedIds.length) { showToast('인쇄할 일지를 선택해주세요.', 'error'); return; }

  var selectedRecs = printState.records.filter(function(r) { return printState.selected[r.recordId]; });

  closeModal();
  showLoading('인쇄 데이터 준비 중...');

  var allLoaded = [];
  var remaining = selectedRecs.length;

  if (!remaining) { hideLoading(); return; }

  selectedRecs.forEach(function(rec) {
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) allLoaded.push({ rec: rec, res: res });
        remaining--;
        if (remaining === 0) _processPrintAndShow(allLoaded);
      })
      .withFailureHandler(function(e) {
        remaining--;
        if (remaining === 0) _processPrintAndShow(allLoaded);
      })
      .getRecordDetail(rec.recordId, rec.logId);
  });
}

function _processPrintAndShow(allLoaded) {
  var weeklyEntries = [];
  var monthlyEntries = [];
  var otherPages    = [];

  allLoaded.forEach(function(entry) {
    var tmpl = (state.logTemplates || []).filter(function(t) { return t.logId === entry.rec.logId; })[0];
    if (!tmpl) return;
    var cfg  = buildConfigFromDbItems(tmpl);
    var data = {};
    try { data = JSON.parse(entry.res.dataJson || '{}'); } catch(e) {}

    if (WEEKLY_PRINT_LOG_IDS[entry.rec.logId]) {
      weeklyEntries.push({ rec: entry.rec, data: data, sigRes: entry.res, cfg: cfg });
    } else if (MONTHLY_PRINT_LOG_IDS[entry.rec.logId]) {
      monthlyEntries.push({ rec: entry.rec, data: data, sigRes: entry.res, cfg: cfg });
    } else {
      otherPages.push({ sortKey: entry.rec.date, html: buildFormPrintHtml(entry.rec, entry.res.dataJson, entry.res, cfg) });
    }
  });

  // si0201: 주 단위로 묶어서 weekly 인쇄
  var weekGroups = {};
  weeklyEntries.forEach(function(e) {
    var monday = _si0201GetMonday(e.rec.date);
    var weekKey = e.rec.logId + '::' + monday;
    if (!weekGroups[weekKey]) weekGroups[weekKey] = [];
    weekGroups[weekKey].push(e);
  });

  var weekPages = [];
  Object.keys(weekGroups).sort().forEach(function(weekKey) {
    var entries = weekGroups[weekKey].sort(function(a, b) { return a.rec.date < b.rec.date ? -1 : 1; });
    weekPages.push({ sortKey: weekKey, html: buildWeeklyForeignMatterPrintHtml(entries, entries[0].cfg) });
  });

  var monthGroups = {};
  monthlyEntries.forEach(function(e) {
    var monthKey = e.rec.logId + '::' + String(e.rec.date || '').slice(0, 7);
    if (!monthGroups[monthKey]) monthGroups[monthKey] = [];
    monthGroups[monthKey].push(e);
  });

  var monthPages = [];
  Object.keys(monthGroups).sort().forEach(function(monthKey) {
    var entries = monthGroups[monthKey].sort(function(a, b) { return a.rec.date < b.rec.date ? -1 : 1; });
    monthPages.push({ sortKey: monthKey, html: buildMonthlyWorkplacePrintHtml(entries, entries[0].cfg) });
  });

  var allPages = otherPages.concat(weekPages, monthPages);
  allPages.sort(function(a, b) { return a.sortKey < b.sortKey ? -1 : a.sortKey > b.sortKey ? 1 : 0; });
  showPrintOverlay(allPages.map(function(p) { return p.html; }).join(''));
}

// ── 결재란 텍스트 넘침 자동 축소 ────────────────────────
function fitPdocApproveTextInOverlay(container) {
  var MIN_PT = 4.5;
  var cells = container.querySelectorAll('.pdoc-approve-grid .pdoc-val-col .pdoc-fit');
  cells.forEach(function(span) {
    var fs = parseFloat(window.getComputedStyle(span).fontSize) || 9;
    // px → pt 변환 후 반복 축소
    var ptSize = fs * 0.75;
    while (span.scrollWidth > span.clientWidth && ptSize > MIN_PT) {
      ptSize -= 0.5;
      span.style.fontSize = ptSize + 'pt';
    }
  });
}

// ── 프린트 오버레이 표시 ───────────────────────────────
function showPrintOverlay(contentHtml) {
  hideLoading();
  var overlay = document.getElementById('print-overlay');
  var content = document.getElementById('print-overlay-content');
  if (!overlay || !content) return;
  content.innerHTML = contentHtml;
  overlay.classList.remove('hidden');
  // DOM 렌더링 후 결재란 텍스트 넘침 조정
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      fitPdocApproveTextInOverlay(content);
    });
  });
}

function closePrintOverlay() {
  var overlay = document.getElementById('print-overlay');
  if (overlay) overlay.classList.add('hidden');
}

function triggerWindowPrint() {
  window.print();
}
</script>
