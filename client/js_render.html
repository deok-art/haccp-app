<script>
// ════════════════════════════════════════════════════════
//  js_render.html — todo/done 목록 렌더링
// ════════════════════════════════════════════════════════

function renderLists() {
  renderTodoList();
  renderDoneList();
}

function _renderCreateUtcDate(dateStr) {
  var parts = String(dateStr || '').split('-').map(Number);
  return new Date(Date.UTC(parts[0] || 1970, (parts[1] || 1) - 1, parts[2] || 1));
}

function _renderFormatUtcDate(date) {
  return date.toISOString().slice(0, 10);
}

function _renderGetWeekStart(dateStr) {
  var date = _renderCreateUtcDate(dateStr);
  var day = date.getUTCDay();
  var diff = day === 0 ? -6 : 1 - day;
  date.setUTCDate(date.getUTCDate() + diff);
  return _renderFormatUtcDate(date);
}

function _renderGetIntervalPeriodKey(dateStr, interval) {
  if (!dateStr) return '';
  if (interval === 'weekly') return _renderGetWeekStart(dateStr);
  if (interval === 'monthly') return String(dateStr).slice(0, 7);
  return String(dateStr);
}

function _renderHasCurrentPeriodDone(log) {
  var currentKey = _renderGetIntervalPeriodKey(state.serverToday, log.interval);
  return state.records.some(function(rec) {
    return rec.logId === log.id &&
      (rec.factoryId || 'pb2') === state.currentFactory &&
      rec.status !== '작성중' &&
      rec.status !== '미작성' &&
      _renderGetIntervalPeriodKey(rec.date, log.interval) === currentKey;
  });
}

// ── 할일(미작성/작성중) 목록 — 현재 선택 공장만 ─────────
function renderTodoList() {
  var list = document.getElementById('todo-list');
  list.innerHTML = '';

  var groups = [
    { key: 'daily',   label: '📋 일간 일지', cls: 'daily'   },
    { key: 'weekly',  label: '📅 주간 일지', cls: 'weekly'  },
    { key: 'monthly', label: '📆 월간 일지', cls: 'monthly' }
  ];

  // 현재 공장 일지만 필터링
  var currentFactory = state.currentFactory;

  // '미작성' + '작성중' 모두 TODO 탭에 표시
  var activeRecs = state.records.filter(function(r) {
    return (r.status === '작성중' || r.status === '미작성') && (r.factoryId || 'pb2') === currentFactory;
  });

  var totalCount = 0;

  groups.forEach(function(group) {
    // 현재 공장에 속하는 일지만
    var logsInGroup = state.logs.filter(function(l) {
      return l.interval === group.key && (l.factoryId || 'pb2') === currentFactory;
    });
    if (!logsInGroup.length) return;

    var section = document.createElement('div');
    section.className = 'interval-section';

    var header = document.createElement('div');
    header.className = 'interval-header ' + group.cls;
    header.innerHTML = group.label +
      '<span style="margin-left:auto;font-size:12px;opacity:0.7;">' + logsInGroup.length + '건</span>';
    section.appendChild(header);

    logsInGroup.forEach(function(log) {
      var recsForLog = activeRecs
        .filter(function(r) { return r.logId === log.id; })
        .sort(function(a, b) { return String(b.date).localeCompare(String(a.date)); });

      if (recsForLog.length > 0) {
        recsForLog.forEach(function(rec) {
          var card = document.createElement('div');

          if (rec.status === '작성중') {
            card.className = 'log-card writing';
            card.id        = 'log-card-' + rec.recordId;

            var actionHtml =
              '<button class="action-btn btn-submit" onclick="event.stopPropagation();openForm(\'' +
                rec.recordId + '\',\'' + log.id + '\',\'' + log.title + '\',\'' + rec.date + '\')">✏️ 수정하기</button>';

            card.innerHTML =
              '<div class="status-dot writing"></div>' +
              '<div class="log-card-body">' +
                '<div class="log-card-title">' + log.title + '</div>' +
                '<div class="log-card-sub">✏️ 작성 중 · ' + rec.date + '</div>' +
              '</div>' +
              '<div class="log-card-action" id="card-action-' + rec.recordId + '">' + actionHtml + '</div>';
          } else {
            // '미작성' DB 레코드 — 플레이스홀더 스타일, 클릭 시 startNewLog
            card.className = 'log-card unstarted';
            card.id        = 'log-card-' + rec.recordId;
            card.innerHTML =
              '<div class="status-dot unstarted"></div>' +
              '<div class="log-card-body">' +
                '<div class="log-card-title">' + log.title + '</div>' +
                '<div class="log-card-sub">⬜ 미작성</div>' +
              '</div>' +
              '<div class="log-card-action" id="card-action-' + rec.recordId + '"></div>';

            card.onclick = (function(logId, title, cardElem, targetDate) {
              return function() { startNewLog(logId, title, cardElem, targetDate); };
            })(log.id, log.title, card, rec.date);
          }

          section.appendChild(card);
          totalCount++;
        });
        return;
      }

      // active 레코드가 없더라도 현재 주기 구간 완료본이 있으면 플레이스홀더를 숨긴다.
      if (_renderHasCurrentPeriodDone(log)) return;

      var card = document.createElement('div');
      card.className = 'log-card unstarted';
      card.id        = 'log-card-' + log.id;
      card.innerHTML =
        '<div class="status-dot unstarted"></div>' +
        '<div class="log-card-body">' +
          '<div class="log-card-title">' + log.title + '</div>' +
          '<div class="log-card-sub">⬜ 미작성</div>' +
        '</div>' +
        '<div class="log-card-action" id="card-action-' + log.id + '"></div>';

      card.onclick = (function(logId, title, cardElem) {
        return function() { startNewLog(logId, title, cardElem, state.serverToday); };
      })(log.id, log.title, card);

      section.appendChild(card);
      totalCount++;
    });

    list.appendChild(section);
  });

  document.getElementById('todo-count').innerText = totalCount;
}

/**
 * 새 일지 레코드 생성 후 폼 열기
 */
function startNewLog(logId, title, cardElem, targetDate) {
  var workDate = targetDate || state.serverToday;
  cardElem.onclick = null;
  showLoading('일지 생성 중...');

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        // 기존 '미작성' 레코드 재사용 시 중복 push 방지
        var existingRec = state.records.find(function(r) { return r.recordId === res.recordId; });
        if (existingRec) {
          existingRec.status = '작성중';
          existingRec.date = existingRec.date || workDate;
          existingRec.writerDate = existingRec.writerDate || workDate;
          existingRec.factoryId = existingRec.factoryId || state.currentFactory || 'pb2';
          existingRec.writerId = existingRec.writerId || state.user.id;
          existingRec.writerName = existingRec.writerName || state.user.name;
          if (existingRec.reviewerName === undefined && existingRec.reviewer) existingRec.reviewerName = existingRec.reviewer;
          if (existingRec.approverName === undefined && existingRec.approver) existingRec.approverName = existingRec.approver;
        } else {
          state.records.push({
            recordId: res.recordId, logId: logId, title: title,
            date: workDate, writerId: state.user.id,
            writerName: state.user.name,
            writerDate: workDate,
            reviewerId: '', reviewerName: '', reviewerDate: '',
            approverId: '', approverName: '', approverDate: '',
            writerRole: getCurrentRole(),
            factoryId: state.currentFactory || 'pb2',
            status: '작성중', defectInfo: ''
          });
        }
        openForm(res.recordId, logId, title, workDate);
      } else {
        hideLoading();
        showToast('일지 생성 실패: ' + (res.message || ''), 'error');
        cardElem.onclick = (function(lid, t, ce, d) {
          return function() { startNewLog(lid, t, ce, d); };
        })(logId, title, cardElem, workDate);
      }
    })
    .withFailureHandler(function() {
      hideLoading();
      showToast('서버 통신 오류. 다시 시도해주세요.', 'error');
      cardElem.onclick = (function(lid, t, ce, d) {
        return function() { startNewLog(lid, t, ce, d); };
      })(logId, title, cardElem, workDate);
    })
    .createNewLog(logId, title, state.user.id, state.user.name, workDate, state.currentFactory);
}

// ── 완료(결재/진행) 목록 — 권한 있는 모든 공장 표시 ────────
function renderDoneList() {
  var list = document.getElementById('done-list');
  list.innerHTML = '';

  var userRoles = (state.user && state.user.factoryRoles) ? state.user.factoryRoles : {};

  // 결재 탭: 권한 있는 모든 공장 일지 표시
  var recs = state.records.filter(function(r) {
    return r.status !== '작성중' && r.status !== '미작성' && (userRoles[r.factoryId] || 0) >= 1;
  });

  var currentRole = getCurrentRole();

  if (state.currentFilter === 'need-review') {
    recs = recs.filter(function(r) {
      return r.status === '작성완료' && (userRoles[r.factoryId] || 0) === 2;
    });
  } else if (state.currentFilter === 'need-approve') {
    recs = recs.filter(function(r) {
      return (r.status === '검토완료' || (currentRole >= 3 && r.status === '작성완료')) && (userRoles[r.factoryId] || 0) >= 3;
    });
  } else if (state.currentFilter === 'completed') {
    recs = recs.filter(function(r) { return r.status === '승인완료'; });
  }

  if (!recs.length) {
    list.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">해당하는 일지가 없습니다.</p>';
    document.getElementById('done-count').innerText =
      state.records.filter(function(r) { return r.status !== '작성중' && r.status !== '미작성'; }).length;
    return;
  }

  var dates = Array.from(new Set(recs.map(function(r) { return r.date; }))).sort().reverse();
  dates.forEach(function(date) {
    var hdr = document.createElement('div');
    hdr.className = 'date-divider';
    hdr.innerHTML = '📅 ' + date + (date === state.serverToday ? ' (오늘)' : '');
    list.appendChild(hdr);

    recs.filter(function(r) { return r.date === date; })
      .sort(function(a, b) {
        if (a.defectInfo && !b.defectInfo) return -1;
        if (!a.defectInfo && b.defectInfo) return  1;
        return b.recordId.localeCompare(a.recordId);
      })
      .forEach(function(rec) { list.appendChild(buildDoneCard(rec)); });
  });

  document.getElementById('done-count').innerText =
    state.records.filter(function(r) { return r.status !== '작성중' && r.status !== '미작성'; }).length;
}

/**
 * 완료 카드 DOM 생성
 */
function buildDoneCard(rec) {
  // 해당 레코드 공장에서의 현재 사용자 권한
  var userRoles = (state.user && state.user.factoryRoles) ? state.user.factoryRoles : {};
  var role = parseInt(userRoles[rec.factoryId] || 1);

  // 공장 뱃지 (현재 공장이 아닌 경우에만 표시)
  var factory = state.factories.find(function(f) { return f.id === rec.factoryId; });
  var factoryBadge = (rec.factoryId !== state.currentFactory && factory)
    ? '<span style="background:#8e44ad;color:white;font-size:10px;padding:2px 6px;border-radius:4px;margin-right:5px;">🏭 ' + factory.name + '</span>'
    : '';
  var wrap = document.createElement('div');
  wrap.className = 'done-card-wrap';
  wrap.id        = 'card-wrap-' + rec.recordId;

  // 부적합 미리보기
  var defectHtml = '', hasDefect = false;
  if (rec.defectInfo && rec.defectInfo !== 'undefined' && rec.defectInfo !== '') {
    try {
      var d = JSON.parse(rec.defectInfo);
      defectHtml =
        '<div class="defect-preview">' +
          '<strong>⚠️ 부적합: ' + d.item + '</strong><br>' +
          '내용: ' + d.content + '<br>' +
          '<span style="color:#27ae60;">✅ 조치: ' + d.action + '</span>' +
        '</div>';
      hasDefect = true;
    } catch (e) {}
  }

  // 스테퍼
  var s1 = 'step step-write';
  var hasReviewer = rec.reviewer && rec.reviewer !== '' && rec.reviewer !== '-';
  var s2 = (hasReviewer && (rec.status === '검토완료' || rec.status === '승인완료')) ? 'step step-review' : 'step';
  var s3 = rec.status === '승인완료' ? 'step step-approve' : 'step';

  var badgeColor = rec.status === '승인완료' ? '#27ae60'
                 : rec.status === '검토완료' ? '#2980b9'
                 : '#e67e22';

  var btns = '';
  if (!state.selectMode) {

    // 검토 버튼 — 권한2 전용, 작성완료 상태, 본인 문서 제외, 권한2는 권한3 문서 검토 불가
    var canReview = role === 2
      && rec.status === '작성완료'
      && rec.writerId !== state.user.id
      && !(parseInt(rec.writerRole || '1') >= 3);
    if (canReview) {
      btns += '<button class="action-btn btn-review" onclick="doAction(\'' + rec.recordId + '\',\'REVIEW\',\'' + rec.title + '\')">검토</button>';
    }

    // 검토취소 — 검토완료 상태 + (본인이 검토했거나 권한3)
    if (rec.status === '검토완료') {
      var canCancelReview = role >= 3 || (role >= 2 && rec.reviewer === state.user.name);
      if (canCancelReview) {
        btns += '<button class="btn-ghost btn-ghost-review" onclick="doAction(\'' + rec.recordId + '\',\'CANCEL_REVIEW\',\'' + rec.title + '\')">검토취소</button>';
      }
    }

    // 승인 버튼 — 권한3, 검토완료 또는 작성완료 상태
    if (role >= 3 && (rec.status === '검토완료' || rec.status === '작성완료')) {
      btns += '<button class="action-btn btn-approve" onclick="doAction(\'' + rec.recordId + '\',\'APPROVE\',\'' + rec.title + '\')">승인</button>';
    }

    // 승인취소 — 권한3, 승인완료 상태
    if (role >= 3 && rec.status === '승인완료') {
      btns += '<button class="btn-ghost btn-ghost-approve" onclick="doAction(\'' + rec.recordId + '\',\'REVOKE\',\'' + rec.title + '\')">승인취소</button>';
    }

    // 작성취소 — 작성완료 상태 + 본인 작성 문서만 (작성중으로 복귀, 서명 초기화)
    if (rec.status === '작성완료' && rec.writerId === state.user.id) {
      btns += '<button class="btn-ghost btn-ghost-danger" onclick="doAction(\'' + rec.recordId + '\',\'CANCEL\',\'' + rec.title + '\')">작성취소</button>';
    }
  }

  var checkbox = (state.selectMode && (rec.status !== '승인완료' || state.revokeMode))
    ? '<input type="checkbox" class="card-check date-' + rec.date + '" data-id="' + rec.recordId +
      '" data-status="' + rec.status + '" onchange="updateCount()">'
    : '';

  wrap.innerHTML =
    '<div class="done-card' + (hasDefect ? ' defect' : '') + '">' +
      checkbox +
      '<div class="done-card-clickable" onclick="viewRecord(\'' + rec.recordId + '\',\'' + rec.logId + '\',\'' + rec.title + '\')">' +
        '<span class="status-badge" style="background:' + badgeColor + '">' + rec.status + '</span>' +
        '<h4 style="margin:5px 0;font-size:14px;">' + factoryBadge + rec.title + '</h4>' +
        '<div style="font-size:11px;color:#888;">작성: ' + rec.writerName +
          (rec.reviewer  ? ' · 검토: ' + rec.reviewer  : '') +
          (rec.approver  ? ' · 승인: ' + rec.approver  : '') +
        '</div>' +
        defectHtml +
      '</div>' +
      '<div style="text-align:right;flex-shrink:0;">' +
        '<div class="stepper"><span class="' + s1 + '">작성</span><span class="' + s2 + '">검토</span><span class="' + s3 + '">승인</span></div>' +
        '<div style="margin-top:8px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;">' + btns + '</div>' +
      '</div>' +
    '</div>';

  return wrap;
}

/**
 * 단건 결재 액션 실행
 */
var pendingActionContext = null;

function openActionDateModal(recordId, action, title, defaultActionDate, minActionDate, writerDate, reviewerDate) {
  pendingActionContext = {
    recordId: recordId,
    action: action,
    title: title,
    minActionDate: minActionDate || '',
    writerDate: writerDate || '',
    reviewerDate: reviewerDate || ''
  };
  var label = action === 'REVIEW' ? '\uAC80\uD1A0\uC77C' : '\uC2B9\uC778\uC77C';
  var writerInfo = writerDate || '-';
  var reviewerInfo = reviewerDate || '-';
  var infoHtml =
    '<div style="font-size:12px;color:#666;background:#f8f9fa;border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin:0 0 10px;">' +
      '<div><strong>\uC791\uC131\uC77C:</strong> ' + writerInfo + '</div>' +
      (action === 'APPROVE'
        ? '<div style="margin-top:4px;"><strong>\uAC80\uD1A0\uC77C:</strong> ' + reviewerInfo + '</div>'
        : '') +
    '</div>';
  var initialDate = defaultActionDate || '';
  if (minActionDate && (!initialDate || initialDate < minActionDate)) initialDate = minActionDate;
  var html =
    '<p style="font-size:13px;color:#555;margin:0 0 10px;">\uC0AC\uD6C4\uC791\uC131 \uBB38\uC11C\uB294 ' + label + '\uC744 \uC9C1\uC811 \uC9C0\uC815\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.</p>' +
    infoHtml +
    '<input type="date" id="action-date-input" value="' + initialDate + '" min="' + (minActionDate || '') + '"' +
      ' style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;font-size:14px;">' +
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">' +
      '<button onclick="cancelActionDateModal()" style="padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;">\uCDE8\uC18C</button>' +
      '<button onclick="submitActionDateModal()" class="btn-primary" style="padding:8px 16px;">\uD655\uC778</button>' +
    '</div>';
  openModal(label + ' \uC785\uB825', html);
}

function cancelActionDateModal() {
  pendingActionContext = null;
  closeModal();
}

function submitActionDateModal() {
  var input = document.getElementById('action-date-input');
  var actionDate = input ? input.value : '';
  if (!actionDate) {
    alert('\uB0A0\uC9DC\uB97C \uC785\uB825\uD574\uC8FC\uC138\uC694.');
    return;
  }
  if (!/^\d{4}-\d{2}-\d{2}$/.test(actionDate)) {
    alert('\uB0A0\uC9DC \uD615\uC2DD\uC774 \uC62C\uBC14\uB974\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4. YYYY-MM-DD \uD615\uC2DD\uC73C\uB85C \uC785\uB825\uD574\uC8FC\uC138\uC694.');
    return;
  }

  var ctx = pendingActionContext;
  if (ctx && ctx.minActionDate && actionDate < ctx.minActionDate) {
    var baseLabel = ctx.action === 'APPROVE' && ctx.reviewerDate ? '\uAC80\uD1A0\uC77C' : '\uC791\uC131\uC77C';
    var baseDate = ctx.action === 'APPROVE' && ctx.reviewerDate ? ctx.reviewerDate : ctx.writerDate;
    alert('\uC120\uD0DD\uD55C ' + (ctx.action === 'REVIEW' ? '\uAC80\uD1A0\uC77C' : '\uC2B9\uC778\uC77C') + '\uC740 ' + baseLabel + '(' + (baseDate || ctx.minActionDate) + ') \uC774\uC804\uC73C\uB85C \uC9C0\uC815\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.');
    return;
  }
  pendingActionContext = null;
  closeModal();
  if (!ctx) return;
  doAction(ctx.recordId, ctx.action, ctx.title, actionDate);
}

function doAction(recordId, action, title, customActionDate) {
  var msgs = {
    CANCEL: '\uC791\uC131\uCDE8\uC18C \uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?',
    REVIEW: '\uAC80\uD1A0 \uCC98\uB9AC\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?',
    CANCEL_REVIEW: '\uAC80\uD1A0\uB97C \uCDE8\uC18C\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?',
    APPROVE: '\uC2B9\uC778 \uCC98\uB9AC\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?',
    REVOKE: '\uC2B9\uC778\uC744 \uCDE8\uC18C\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'
  };
  if (!confirm('[' + title + '] ' + (msgs[action] || '\uC9C4\uD589\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'))) return;

  customActionDate = customActionDate || '';
  var rec = state.records.find(function(r) { return r.recordId === recordId; });
  var defaultActionDate = (rec && rec.date) || state.serverToday;
  var writerDate = (rec && (rec.writerDate || rec.date)) || state.serverToday;
  var reviewerDate = (rec && rec.reviewerDate) || '';
  var minActionDate = action === 'APPROVE'
    ? (reviewerDate || writerDate)
    : writerDate;
  var isPostDated = rec && rec.date && rec.date !== state.serverToday;
  if (customActionDate && minActionDate && (action === 'REVIEW' || action === 'APPROVE') && customActionDate < minActionDate) {
    var minLabel = action === 'APPROVE' && reviewerDate ? '\uAC80\uD1A0\uC77C' : '\uC791\uC131\uC77C';
    alert((action === 'REVIEW' ? '\uAC80\uD1A0\uC77C' : '\uC2B9\uC778\uC77C') + '\uC740 ' + minLabel + '(' + minActionDate + ') \uC774\uD6C4\uB85C \uC9C0\uC815\uD574\uC8FC\uC138\uC694.');
    return;
  }
  if (!customActionDate && isPostDated && (action === 'REVIEW' || action === 'APPROVE')) {
    openActionDateModal(recordId, action, title, defaultActionDate, minActionDate, writerDate, reviewerDate);
    return;
  }

  showCardLoading(recordId);
  google.script.run
    .withSuccessHandler(function(res) {
      hideCardLoading(recordId);
      if (res.success) {
        if (action === 'CANCEL') {
          state.records.forEach(function(r) {
            if (r.recordId !== recordId) return;
            r.status = '\uC791\uC131\uC911';
            r.reviewerName = '';
            r.reviewerDate = '';
            r.approverName = '';
            r.approverDate = '';
          });
          renderLists();
        } else {
          state.records.forEach(function(r) {
            if (r.recordId !== recordId) return;
            if (action === 'CANCEL_REVIEW') {
              r.status = '\uC791\uC131\uC644\uB8CC';
              r.reviewerName = '';
              r.reviewerDate = '';
            }
            if (action === 'REVIEW') {
              r.status = '\uAC80\uD1A0\uC644\uB8CC';
              r.reviewerName = state.user.name;
              r.reviewerDate = customActionDate || r.date || state.serverToday;
            }
            if (action === 'APPROVE') {
              r.status = '\uC2B9\uC778\uC644\uB8CC';
              r.approverName = state.user.name;
              r.approverDate = customActionDate || r.date || state.serverToday;
            }
            if (action === 'REVOKE') {
              r.status = r.reviewerName ? '\uAC80\uD1A0\uC644\uB8CC' : '\uC791\uC131\uC644\uB8CC';
              r.approverName = '';
              r.approverDate = '';
            }
          });
          renderLists();
        }
        showToast('\uCC98\uB9AC \uC644\uB8CC!', 'success');
      } else {
        alert(res.message);
      }
    })
    .withFailureHandler(function() {
      hideCardLoading(recordId);
      alert('\uCC98\uB9AC \uC911 \uC624\uB958\uAC00 \uBC1C\uC0DD\uD588\uC2B5\uB2C8\uB2E4.');
    })
    .processRecordAction(recordId, action === 'CANCEL' ? 'RESET_TO_WRITING' : action, state.user.id, state.user.name, getCurrentRole(), customActionDate);
}
</script>
