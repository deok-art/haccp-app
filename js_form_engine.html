<script>
// ════════════════════════════════════════════════════════
//  js_form_engine.html — 적합/부적합 체크리스트 폼 공통 엔진
//
//  각 양식 파일은 FORM_CONFIG를 정의하고 얇은 래퍼만 두면 된다.
//  CONFIG 구조:
//    { formId, title, docNo, revision, period, location, groups[] }
//  groups 항목 구조:
//    { group: '그룹명', items: [{ key, sub, desc }, ...] }
// ════════════════════════════════════════════════════════

// ── 폼 초기화 (formState + 렌더링) ────────────────────
function initFormEngine(config, containerId, savedJson) {
  var saved = {};
  if (savedJson) { try { saved = JSON.parse(savedJson); } catch(e) {} }

  config.groups.forEach(function(grp) {
    grp.items.forEach(function(item) {
      var s = (saved.items || {})[item.key] || {};
      formState.checkData[item.key]    = s.result      || 'ok';
      formState.defectTexts[item.key]  = s.defectText  || '';
      formState.actionTexts[item.key]  = s.actionText  || '';
      formState.defectPhotos[item.key] = s.defectPhoto || '';
      formState.actionPhotos[item.key] = s.actionPhoto || '';
    });
  });

  renderFormGroups(config, containerId);
}

// ── 그룹 렌더링 ────────────────────────────────────────
function renderFormGroups(config, containerId) {
  var container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  var fid = config.formId;

  config.groups.forEach(function(grp) {
    var groupEl = document.createElement('div');
    groupEl.style.cssText = 'border:1px solid #e0e0e0;border-radius:10px;margin-bottom:10px;overflow:hidden;';

    var header = document.createElement('div');
    header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f5f7fa;cursor:pointer;';
    header.innerHTML =
      '<span style="font-size:13px;font-weight:600;color:#333;">' + grp.group + '</span>' +
      '<span class="fengine-arrow" style="font-size:12px;color:#aaa;transition:transform 0.2s;">▼</span>';
    header.onclick = function() { toggleFormGroup(header); };

    var body = document.createElement('div');
    body.style.cssText = 'padding:10px 12px;';

    grp.items.forEach(function(item) {
      body.appendChild(buildFormItemEl(item, fid));
    });

    groupEl.appendChild(header);
    groupEl.appendChild(body);
    container.appendChild(groupEl);
  });
}

// ── 항목 엘리먼트 생성 ─────────────────────────────────
function buildFormItemEl(item, fid) {
  var isNg        = formState.checkData[item.key] === 'ng';
  var defectText  = formState.defectTexts[item.key]  || '';
  var actionText  = formState.actionTexts[item.key]  || '';
  var defectPhoto = formState.defectPhotos[item.key] || '';
  var actionPhoto = formState.actionPhotos[item.key] || '';
  var key         = item.key;

  var el = document.createElement('div');
  el.id  = fid + '-item-' + key;
  el.style.cssText = 'margin-bottom:10px;padding:10px;border:1px solid ' +
    (isNg ? '#e74c3c' : '#eee') + ';border-radius:8px;transition:border-color 0.2s;';

  el.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">' +
      '<div style="flex:1;min-width:0;">' +
        '<span style="font-size:13px;font-weight:600;">' + item.sub + '</span>' +
        '<span style="font-size:11px;color:#888;margin-left:6px;">' + item.desc + '</span>' +
      '</div>' +
      '<div style="display:flex;gap:6px;flex-shrink:0;">' +
        '<button class="toggle-btn ok' + (!isNg ? ' selected' : '') + '" id="' + fid + '-ok-' + key + '"' +
          ' onclick="selectFormResult(\'' + key + '\',\'ok\',\'' + fid + '\')"' +
          ' style="padding:7px 14px;border-radius:8px;border:1px solid #ddd;cursor:pointer;font-size:13px;white-space:nowrap;">○ 적합</button>' +
        '<button class="toggle-btn ng' + (isNg ? ' selected' : '') + '" id="' + fid + '-ng-' + key + '"' +
          ' onclick="selectFormResult(\'' + key + '\',\'ng\',\'' + fid + '\')"' +
          ' style="padding:7px 14px;border-radius:8px;border:1px solid #ddd;cursor:pointer;font-size:13px;white-space:nowrap;">× 부적합</button>' +
      '</div>' +
    '</div>' +

    '<div id="' + fid + '-ng-area-' + key + '"' + (!isNg ? ' class="hidden"' : '') +
      ' style="background:#fff8f8;border:1px solid #fdd;border-radius:8px;padding:10px;margin-top:4px;">' +

      '<div style="margin-bottom:10px;">' +
        '<label style="font-size:11px;font-weight:700;color:#e74c3c;display:block;margin-bottom:4px;">🚨 부적합 내용 <span style="color:#e74c3c;">*</span></label>' +
        '<textarea id="' + fid + '-defect-text-' + key + '"' +
          ' placeholder="부적합 내용을 상세히 기록해주세요."' +
          ' style="width:100%;padding:8px;border:1px solid #fbb;border-radius:6px;font-size:13px;resize:vertical;min-height:60px;box-sizing:border-box;font-family:inherit;">' +
          defectText + '</textarea>' +
      '</div>' +

      '<div style="margin-bottom:12px;">' +
        '<label style="font-size:11px;font-weight:700;color:#e74c3c;display:block;margin-bottom:6px;">📷 부적합 사진 <span style="font-weight:400;color:#999;">(선택)</span></label>' +
        '<div id="defect-photo-preview-' + key + '" style="margin-bottom:6px;">' +
          (defectPhoto ? '<img src="' + defectPhoto + '" style="max-width:100%;max-height:160px;border-radius:6px;display:block;">' : '') +
        '</div>' +
        '<div class="photo-row">' +
          '<button type="button" class="photo-add-btn" onclick="triggerPhoto(\'defect\',\'' + key + '\',\'camera\')"><span>📷</span>카메라</button>' +
          '<button type="button" class="photo-add-btn gallery-btn" onclick="triggerPhoto(\'defect\',\'' + key + '\',\'gallery\')"><span>🖼</span>갤러리</button>' +
        '</div>' +
        '<input type="file" accept="image/*" capture="environment"' +
          ' id="photo-input-defect-camera-' + key + '" style="display:none;"' +
          ' onchange="handlePhoto(\'defect\',\'' + key + '\',this,\'' + item.sub + '_부적합\')">' +
        '<input type="file" accept="image/*"' +
          ' id="photo-input-defect-gallery-' + key + '" style="display:none;"' +
          ' onchange="handlePhoto(\'defect\',\'' + key + '\',this,\'' + item.sub + '_부적합\')">' +
      '</div>' +

      '<div style="margin-bottom:10px;">' +
        '<label style="font-size:11px;font-weight:700;color:#2980b9;display:block;margin-bottom:4px;">🔧 개선조치 내용 <span style="color:#e74c3c;">*</span></label>' +
        '<textarea id="' + fid + '-action-text-' + key + '"' +
          ' placeholder="취한 조치 내용을 기록해주세요."' +
          ' style="width:100%;padding:8px;border:1px solid #aed6f1;border-radius:6px;font-size:13px;resize:vertical;min-height:60px;box-sizing:border-box;font-family:inherit;">' +
          actionText + '</textarea>' +
      '</div>' +

      '<div>' +
        '<label style="font-size:11px;font-weight:700;color:#2980b9;display:block;margin-bottom:6px;">📷 개선조치 사진 <span style="font-weight:400;color:#999;">(선택)</span></label>' +
        '<div id="action-photo-preview-' + key + '" style="margin-bottom:6px;">' +
          (actionPhoto ? '<img src="' + actionPhoto + '" style="max-width:100%;max-height:160px;border-radius:6px;display:block;">' : '') +
        '</div>' +
        '<div class="photo-row">' +
          '<button type="button" class="photo-add-btn" onclick="triggerPhoto(\'action\',\'' + key + '\',\'camera\')"><span>📷</span>카메라</button>' +
          '<button type="button" class="photo-add-btn gallery-btn" onclick="triggerPhoto(\'action\',\'' + key + '\',\'gallery\')"><span>🖼</span>갤러리</button>' +
        '</div>' +
        '<input type="file" accept="image/*" capture="environment"' +
          ' id="photo-input-action-camera-' + key + '" style="display:none;"' +
          ' onchange="handlePhoto(\'action\',\'' + key + '\',this,\'' + item.sub + '_조치\')">' +
        '<input type="file" accept="image/*"' +
          ' id="photo-input-action-gallery-' + key + '" style="display:none;"' +
          ' onchange="handlePhoto(\'action\',\'' + key + '\',this,\'' + item.sub + '_조치\')">' +
      '</div>' +
    '</div>';

  return el;
}

// ── 그룹 접기/펼치기 ───────────────────────────────────
function toggleFormGroup(header) {
  var body  = header.nextElementSibling;
  var arrow = header.querySelector('.fengine-arrow');
  var open  = body.style.display !== 'none';
  body.style.display    = open ? 'none' : '';
  arrow.style.transform = open ? 'rotate(-90deg)' : '';
}

// ── 적합/부적합 선택 ───────────────────────────────────
function selectFormResult(key, result, fid) {
  formState.checkData[key] = result;
  document.getElementById(fid + '-ok-' + key).classList.toggle('selected', result === 'ok');
  document.getElementById(fid + '-ng-' + key).classList.toggle('selected', result === 'ng');

  var itemEl = document.getElementById(fid + '-item-'    + key);
  var ngArea = document.getElementById(fid + '-ng-area-' + key);
  if (!ngArea) return;

  if (result === 'ng') {
    ngArea.classList.remove('hidden');
    itemEl.style.borderColor = '#e74c3c';
    var dtEl = document.getElementById(fid + '-defect-text-' + key);
    if (dtEl) dtEl.focus();
  } else {
    ngArea.classList.add('hidden');
    itemEl.style.borderColor = '#eee';
  }
}

// ── 전체 적합 ──────────────────────────────────────────
function setAllFormOk(config) {
  config.groups.forEach(function(grp) {
    grp.items.forEach(function(item) { selectFormResult(item.key, 'ok', config.formId); });
  });
  showToast('전체 항목을 적합으로 설정했습니다.', 'success');
}

// ── 데이터 수집 ────────────────────────────────────────
function collectFormData(config) {
  var fid   = config.formId;
  var items = {};
  config.groups.forEach(function(grp) {
    grp.items.forEach(function(item) {
      var dtEl = document.getElementById(fid + '-defect-text-' + item.key);
      var atEl = document.getElementById(fid + '-action-text-' + item.key);
      items[item.key] = {
        result:      formState.checkData[item.key] || 'ok',
        defectText:  dtEl ? dtEl.value : '',
        actionText:  atEl ? atEl.value : '',
        defectPhoto: formState.defectPhotos[item.key] || '',
        actionPhoto: formState.actionPhotos[item.key] || ''
      };
    });
  });
  return { items: items };
}

// ── 검증 ───────────────────────────────────────────────
function validateFormData(data, config) {
  var fid      = config.formId;
  var allItems = [];
  config.groups.forEach(function(grp) { grp.items.forEach(function(i) { allItems.push(i); }); });

  for (var i = 0; i < allItems.length; i++) {
    var item = allItems[i];
    var d    = data.items[item.key] || {};
    if (d.result === 'ng') {
      if (!d.defectText || !d.defectText.trim()) {
        showToast('[' + item.sub + '] 부적합 내용을 입력해주세요!', 'error');
        var el = document.getElementById(fid + '-defect-text-' + item.key);
        if (el) el.focus();
        return false;
      }
      if (!d.actionText || !d.actionText.trim()) {
        showToast('[' + item.sub + '] 개선조치 내용을 입력해주세요!', 'error');
        var el2 = document.getElementById(fid + '-action-text-' + item.key);
        if (el2) el2.focus();
        return false;
      }
    }
  }
  return true;
}

// ── 부적합 요약 ────────────────────────────────────────
function getFormDefectSummary(data, config) {
  var allItems = [];
  config.groups.forEach(function(grp) { grp.items.forEach(function(i) { allItems.push(i); }); });
  var ngItems = allItems.filter(function(item) { return (data.items[item.key] || {}).result === 'ng'; });
  if (!ngItems.length) return '';
  var first = ngItems[0];
  var d     = data.items[first.key] || {};
  return JSON.stringify({
    item:    ngItems.length > 1
      ? '[' + first.sub + '] ' + first.desc + ' 외 ' + (ngItems.length - 1) + '건'
      : '[' + first.sub + '] ' + first.desc,
    content: d.defectText || '',
    action:  d.actionText || ''
  });
}

// ── 결재란 signCols 빌드 ──────────────────────────────
function buildFormSignCols(rec, sigRes) {
  var writerSig   = (sigRes && sigRes.writerSignature)
    ? sigRes.writerSignature
    : (state.user.signature && rec.writerId === state.user.id ? state.user.signature : '');
  var reviewerSig = (sigRes && sigRes.reviewerSignature) ? sigRes.reviewerSignature : '';
  var approverSig = (sigRes && sigRes.approverSignature) ? sigRes.approverSignature : '';
  var writerLabel   = (sigRes && sigRes.writerTitle)   || state.user.title || state.user.rank || '작성';
  var reviewerLabel = (sigRes && sigRes.reviewerTitle) || '검토';
  var approverLabel = (sigRes && sigRes.approverTitle) || '승인';
  var hasReviewer   = rec.reviewer && rec.reviewer !== '' && rec.reviewer !== '-';
  var hasApprover   = rec.approver && rec.approver !== '' && rec.approver !== '-';

  var cols = [{ role: '작성', title: writerLabel || '-', name: rec.writerName || '-', date: rec.date || '-', sig: writerSig || '' }];
  if (hasReviewer) cols.push({ role: '검토', title: reviewerLabel || '-', name: rec.reviewer || '-', date: rec.date || '-', sig: reviewerSig || '' });
  cols.push({ role: '승인', title: approverLabel || '-', name: hasApprover ? (rec.approver || '-') : '-', date: hasApprover ? (rec.date || '-') : '-', sig: hasApprover ? (approverSig || '') : '' });
  return cols;
}

// ── 인쇄 본문 HTML (2칼럼 체크리스트) ─────────────────
function buildFormBodyHtml(data, rec, config) {
  var groups   = config.groups;
  var mid      = Math.ceil(groups.length / 2);
  var left     = groups.slice(0, mid);
  var right    = groups.slice(mid);
  var location = data.location || config.location || '-';
  var period   = config.period  || '-';

  function buildCheckCol(grps) {
    var rows = '';
    grps.forEach(function(grp) {
      rows += '<tr class="pgrp-header"><td colspan="3">' + grp.group + '</td></tr>';
      grp.items.forEach(function(item) {
        var d   = data.items[item.key] || {};
        var res = d.result === 'ng'
          ? '<span class="png">×</span>'
          : '<span class="pok">○</span>';
        rows +=
          '<tr>' +
            '<td class="pitem-sub">'    + item.sub  + '</td>' +
            '<td class="pitem-desc">'   + item.desc + '</td>' +
            '<td class="pitem-result">' + res       + '</td>' +
          '</tr>';
      });
    });
    return '<table class="pcheck">' + rows + '</table>';
  }

  return (
    '<table class="pinfo"><tr>' +
      '<td class="pinfo-label">점검일자</td><td>' + rec.date + '</td>' +
      '<td class="pinfo-label">점검자</td><td>'   + (rec.writerName || '-') + '</td>' +
      '<td class="pinfo-label">점검위치</td><td>' + location + '</td>' +
      '<td class="pinfo-label">점검주기</td><td>' + period + '</td>' +
    '</tr></table>' +
    '<div class="plegend">○ 적합 &nbsp;|&nbsp; × 부적합</div>' +
    '<div class="pcheck-wrap">' +
      buildCheckCol(left) +
      buildCheckCol(right) +
    '</div>'
  );
}

// ── 부적합 페이지 본문 HTML ──────────────────────────
function buildFormDefectHtml(ngItems) {
  var cards = ngItems.map(function(ni) {
    var defImg = ni.d.defectPhoto
      ? '<img src="' + ni.d.defectPhoto + '" class="pdefect-img" onerror="this.style.display=\'none\'">'
      : '';
    var actImg = ni.d.actionPhoto
      ? '<img src="' + ni.d.actionPhoto + '" class="pdefect-img" onerror="this.style.display=\'none\'">'
      : '';
    return (
      '<div class="pdefect-card">' +
        '<div class="pdefect-header">' +
          '<span class="pdefect-grp">'   + ni.grp       + '</span>' +
          '<span class="pdefect-title">' + ni.item.sub  + '</span>' +
          '<span class="pdefect-desc">'  + ni.item.desc + '</span>' +
        '</div>' +
        '<div class="pdefect-body">' +
          '<div class="pdefect-col">' +
            '<div class="pdefect-label-ng">🚨 부적합 내용</div>' +
            '<div class="pdefect-text">' + (ni.d.defectText || '-') + '</div>' +
            defImg +
          '</div>' +
          '<div class="pdefect-col">' +
            '<div class="pdefect-label-act">🔧 개선조치 내용</div>' +
            '<div class="pdefect-text">' + (ni.d.actionText || '-') + '</div>' +
            actImg +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');

  return (
    '<div class="pdefect-section">' +
      '<div class="pdefect-section-title">부적합 및 개선조치 내역 (' + ngItems.length + '건)</div>' +
      cards +
    '</div>'
  );
}

// ── 뷰어 HTML ──────────────────────────────────────────
function buildFormViewHtml(rec, dataJsonStr, title, sigRes, config) {
  var data = {};
  try { data = JSON.parse(dataJsonStr); } catch(e) {}
  if (!data || !data.items) return '<p style="color:#999;text-align:center;padding:20px;">작성된 내용이 없습니다.</p>';

  var location = data.location || config.location || '-';

  var groupHtml = config.groups.map(function(grp) {
    var rows = grp.items.map(function(item) {
      var d          = data.items[item.key] || {};
      var isNg       = d.result === 'ng';
      var resultHtml = isNg
        ? '<span class="result-ng">× 부적합</span>'
        : '<span class="result-ok">○ 적합</span>';

      var ngDetail = '';
      if (isNg) {
        var defPhotoHtml = d.defectPhoto
          ? '<img src="' + d.defectPhoto + '" style="max-width:100%;max-height:120px;border-radius:4px;margin-top:4px;display:block;">'
          : '';
        var actPhotoHtml = d.actionPhoto
          ? '<img src="' + d.actionPhoto + '" style="max-width:100%;max-height:120px;border-radius:4px;margin-top:4px;display:block;">'
          : '';
        ngDetail =
          '<tr><td colspan="2" style="padding:0 10px 10px 20px;background:#fff8f8;">' +
            '<div style="border-left:3px solid #e74c3c;padding-left:10px;margin-bottom:8px;">' +
              '<div style="font-size:11px;font-weight:700;color:#e74c3c;margin-bottom:2px;">🚨 부적합 내용</div>' +
              '<div style="font-size:12px;">' + (d.defectText || '-') + '</div>' +
              defPhotoHtml +
            '</div>' +
            '<div style="border-left:3px solid #2980b9;padding-left:10px;">' +
              '<div style="font-size:11px;font-weight:700;color:#2980b9;margin-bottom:2px;">🔧 개선조치 내용</div>' +
              '<div style="font-size:12px;">' + (d.actionText || '-') + '</div>' +
              actPhotoHtml +
            '</div>' +
          '</td></tr>';
      }

      return '<tr>' +
        '<td style="padding:8px 10px;">' +
          '<span style="font-size:13px;font-weight:600;">' + item.sub + '</span>' +
          '<span style="color:#888;font-size:11px;margin-left:6px;">' + item.desc + '</span>' +
        '</td>' +
        '<td style="text-align:center;padding:8px;white-space:nowrap;">' + resultHtml + '</td>' +
      '</tr>' + ngDetail;
    }).join('');

    return '<tr><td colspan="2" style="background:#f5f7fa;padding:7px 10px;font-size:12px;font-weight:700;color:#444;">' +
      grp.group + '</td></tr>' + rows;
  }).join('');

  return '<div class="view-form-wrap">' +
    '<table class="view-header-table">' +
      '<tr><td class="label">문서명</td><td>' + title + '</td>' +
          '<td class="label">점검일</td><td>' + (rec.date || '-') + '</td></tr>' +
      '<tr><td class="label">점검자</td><td>' + (rec.writerName || '-') + '</td>' +
          '<td class="label">점검위치</td><td>' + location + '</td></tr>' +
    '</table>' +
    '<table class="view-check-table" style="margin-top:12px;">' +
      '<thead><tr>' +
        '<th style="text-align:left;padding:8px 10px;">점검 항목</th>' +
        '<th style="width:80px;">결과</th>' +
      '</tr></thead>' +
      '<tbody>' + groupHtml + '</tbody>' +
    '</table>' +
    buildSigRowHtml(rec, sigRes) +
  '</div>';
}

// ── 인쇄 HTML (전체 페이지 조합) ─────────────────────
function buildFormPrintHtml(rec, dataJsonStr, sigRes, config) {
  var data = {};
  try { data = JSON.parse(dataJsonStr); } catch(e) {}
  if (!data || !data.items) return '';

  var signCols = buildFormSignCols(rec, sigRes);

  var ngItems = [];
  config.groups.forEach(function(grp) {
    grp.items.forEach(function(item) {
      var d = data.items[item.key] || {};
      if (d.result === 'ng') ngItems.push({ grp: grp.group, item: item, d: d });
    });
  });
  var totalPages = ngItems.length ? 2 : 1;

  var page1 = buildPrintPage(
    config.title,
    buildFormBodyHtml(data, rec, config),
    config, signCols, 1, totalPages
  );
  var page2 = ngItems.length
    ? buildPrintPage(
        config.title + ' - 부적합/개선조치',
        buildFormDefectHtml(ngItems),
        config, signCols, 2, totalPages
      )
    : '';

  return page1 + page2;
}
</script>
