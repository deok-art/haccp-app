<script>
// ════════════════════════════════════════════════════════
//  js_render.html — todo/done 목록 렌더링
// ════════════════════════════════════════════════════════

function renderLists() {
  renderTodoList();
  renderDoneList();
}

// ── 할일(미작성/작성중) 목록 — 현재 선택 공장만 ─────────
function renderTodoList() {
  var list = document.getElementById('todo-list');
  list.innerHTML = '';

  var groups = [
    { key: '일간', label: '📋 일간 일지', cls: 'daily'   },
    { key: '주간', label: '📅 주간 일지', cls: 'weekly'  },
    { key: '월간', label: '📆 월간 일지', cls: 'monthly' }
  ];

  // 현재 공장 일지만 필터링
  var currentFactory = state.currentFactory;

  // 미처리 레코드: 작성중 + 미작성 (사후작성 포함, 날짜 무관)
  var pendingRecs = state.records.filter(function(r) {
    return (r.status === '작성중' || r.status === '미작성') &&
           (r.factoryId || 'pb2') === currentFactory;
  });

  // 중복 체크: 같은 날짜+logId에 2개 이상 레코드 (상태 무관, 작성완료 포함)
  var allKeyCount = {};
  state.records
    .filter(function(r) { return (r.factoryId || 'pb2') === currentFactory; })
    .forEach(function(r) {
      var key = r.logId + '|' + r.date;
      allKeyCount[key] = (allKeyCount[key] || 0) + 1;
    });
  // 오늘 이미 레코드가 존재하는 logId (중복 생성 방지)
  var todayLogIds = state.records
    .filter(function(r) { return r.date === state.serverToday && (r.factoryId || 'pb2') === currentFactory; })
    .map(function(r) { return r.logId; });
  // 오늘 작성 완료된 logId (미작성 카드 숨김용)
  var doneIds = state.records
    .filter(function(r) { return r.date === state.serverToday && r.status !== '작성중' && r.status !== '미작성' && (r.factoryId || 'pb2') === currentFactory; })
    .map(function(r) { return r.logId; });

  var totalCount = 0;

  groups.forEach(function(group) {
    // 현재 공장에 속하는 일지만
    var logsInGroup = state.logs.filter(function(l) {
      return l.interval === group.key && (l.factoryId || 'pb2') === currentFactory;
    });
    if (!logsInGroup.length) return;

    var section = document.createElement('div');
    section.className = 'interval-section';

    var header = document.createElement('div');
    header.className = 'interval-header ' + group.cls;
    header.innerHTML = group.label +
      '<span style="margin-left:auto;font-size:12px;opacity:0.7;">' + logsInGroup.length + '건</span>';
    section.appendChild(header);

    logsInGroup.forEach(function(log) {
      var recsForLog = pendingRecs
        .filter(function(r) { return r.logId === log.id; })
        .sort(function(a, b) { return String(b.date).localeCompare(String(a.date)); });

      // 미처리 레코드를 날짜별로 각각 카드 표시 (작성중 / 미작성 구분)
      recsForLog.forEach(function(rec) {
        var card = document.createElement('div');
        var isDuplicate = allKeyCount[rec.logId + '|' + rec.date] > 1;
        var deleteBtn = isDuplicate
          ? '<button class="btn-ghost btn-ghost-danger" style="font-size:11px;padding:4px 8px;margin-top:4px;" ' +
              'onclick="event.stopPropagation();deleteRecord(\'' + rec.recordId + '\',\'' + log.title + '\')">🗑 삭제</button>'
          : '';

        if (rec.status === '작성중') {
          card.className = 'log-card writing';
          card.id        = 'log-card-' + rec.recordId;
          var actionHtml =
            '<button class="action-btn btn-submit" onclick="event.stopPropagation();openForm(\'' +
              rec.recordId + '\',\'' + log.id + '\',\'' + log.title + '\',\'' + rec.date + '\')">✏️ 수정하기</button>' +
            deleteBtn;
          card.innerHTML =
            '<div class="status-dot writing"></div>' +
            '<div class="log-card-body">' +
              '<div class="log-card-title">' + log.title + '</div>' +
              '<div class="log-card-sub">✏️ 작성 중 · ' + rec.date + '</div>' +
            '</div>' +
            '<div class="log-card-action" id="card-action-' + rec.recordId + '">' + actionHtml + '</div>';
        } else {
          // 미작성 플레이스홀더 — 클릭 시 startNewLog (서버가 플레이스홀더 재사용)
          card.className = 'log-card unstarted';
          card.id        = 'log-card-' + rec.recordId;
          card.innerHTML =
            '<div class="status-dot unstarted"></div>' +
            '<div class="log-card-body">' +
              '<div class="log-card-title">' + log.title + '</div>' +
              '<div class="log-card-sub">⬜ 미작성 · ' + rec.date + '</div>' +
            '</div>' +
            '<div class="log-card-action" id="card-action-' + rec.recordId + '">' + deleteBtn + '</div>';
          card.onclick = (function(logId, title, cardElem) {
            return function() { startNewLog(logId, title, cardElem); };
          })(log.id, log.title, card);
        }
        section.appendChild(card);
        totalCount++;
      });

      // 오늘 레코드가 없고 완료도 아니면 → 새 미작성 카드 표시 (오늘 작성 시작)
      if (todayLogIds.indexOf(log.id) !== -1 || doneIds.indexOf(log.id) !== -1) return;

      var card = document.createElement('div');
      card.className = 'log-card unstarted';
      card.id        = 'log-card-' + log.id;
      card.innerHTML =
        '<div class="status-dot unstarted"></div>' +
        '<div class="log-card-body">' +
          '<div class="log-card-title">' + log.title + '</div>' +
          '<div class="log-card-sub">⬜ 미작성</div>' +
        '</div>' +
        '<div class="log-card-action" id="card-action-' + log.id + '"></div>';

      card.onclick = (function(logId, title, cardElem) {
        return function() { startNewLog(logId, title, cardElem); };
      })(log.id, log.title, card);

      section.appendChild(card);
      totalCount++;
    });

    list.appendChild(section);
  });

  document.getElementById('todo-count').innerText = totalCount;
}

/**
 * 새 일지 레코드 생성 후 폼 열기
 */
function startNewLog(logId, title, cardElem) {
  cardElem.onclick = null;
  showLoading('일지 생성 중...');

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        state.records.push({
          recordId: res.recordId, logId: logId, title: title,
          date: state.serverToday, writerId: state.user.id,
          writerName: state.user.name, reviewer: '', approver: '',
          status: '작성중', pdfLink: '', defectInfo: ''
        });
        openForm(res.recordId, logId, title, state.serverToday);
      } else {
        hideLoading();
        showToast('일지 생성 실패: ' + (res.message || ''), 'error');
        cardElem.onclick = (function(lid, t, ce) {
          return function() { startNewLog(lid, t, ce); };
        })(logId, title, cardElem);
      }
    })
    .withFailureHandler(function() {
      hideLoading();
      showToast('서버 통신 오류. 다시 시도해주세요.', 'error');
      cardElem.onclick = (function(lid, t, ce) {
        return function() { startNewLog(lid, t, ce); };
      })(logId, title, cardElem);
    })
    .createNewLog(logId, title, state.user.id, state.user.name, state.serverToday, state.currentFactory);
}

// ── 완료(결재/진행) 목록 — 권한 있는 모든 공장 표시 ────────
function renderDoneList() {
  var list = document.getElementById('done-list');
  list.innerHTML = '';

  var userRoles = (state.user && state.user.factoryRoles) ? state.user.factoryRoles : {};

  // 결재 탭: 권한 있는 모든 공장 일지 표시
  var recs = state.records.filter(function(r) {
    return r.status !== '작성중' && r.status !== '미작성' && (userRoles[r.factoryId] || 0) >= 1;
  });

  var currentRole = getCurrentRole();

  if (state.currentFilter === 'need-review') {
    recs = recs.filter(function(r) {
      return r.status === '작성완료' && (userRoles[r.factoryId] || 0) === 2;
    });
  } else if (state.currentFilter === 'need-approve') {
    recs = recs.filter(function(r) {
      return (r.status === '검토완료' || (currentRole >= 3 && r.status === '작성완료')) && (userRoles[r.factoryId] || 0) >= 3;
    });
  } else if (state.currentFilter === 'completed') {
    recs = recs.filter(function(r) { return r.status === '승인완료'; });
  } else if (state.currentFilter === 'revoke-request') {
    recs = recs.filter(function(r) { return r.status === '취소요청'; });
  } else if (state.currentFilter === 'review-cancel-request') {
    recs = recs.filter(function(r) { return r.status === '검토취소요청'; });
  }

  // 취소요청 탭: 권한3 사용자에게만 표시 + 건수 배지
  var revokeTab = document.getElementById('revoke-request-tab');
  var revokeCountEl = document.getElementById('revoke-request-count');
  if (revokeTab) {
    var revokeCount = state.records.filter(function(r) {
      return r.status === '취소요청' && (userRoles[r.factoryId] || 0) >= 3;
    }).length;
    if (currentRole >= 3 && revokeCount > 0) {
      revokeTab.classList.remove('hidden');
      if (revokeCountEl) revokeCountEl.innerText = revokeCount;
    } else {
      revokeTab.classList.add('hidden');
    }
  }

  // 검토취소요청 탭: 권한2 이상에게 표시 + 건수 배지
  var reviewCancelTab = document.getElementById('review-cancel-request-tab');
  var reviewCancelCountEl = document.getElementById('review-cancel-request-count');
  if (reviewCancelTab) {
    var reviewCancelCount = state.records.filter(function(r) {
      return r.status === '검토취소요청' && (userRoles[r.factoryId] || 0) >= 2;
    }).length;
    if (currentRole >= 2 && reviewCancelCount > 0) {
      reviewCancelTab.classList.remove('hidden');
      if (reviewCancelCountEl) reviewCancelCountEl.innerText = reviewCancelCount;
    } else {
      reviewCancelTab.classList.add('hidden');
    }
  }

  if (!recs.length) {
    list.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">해당하는 일지가 없습니다.</p>';
    document.getElementById('done-count').innerText =
      state.records.filter(function(r) {
        return (r.status === '작성완료' || r.status === '검토완료' || r.status === '취소요청' || r.status === '검토취소요청') &&
               (userRoles[r.factoryId] || 0) >= 1;
      }).length;
    return;
  }

  var dates = Array.from(new Set(recs.map(function(r) { return r.date; }))).sort().reverse();
  dates.forEach(function(date) {
    var hdr = document.createElement('div');
    hdr.className = 'date-divider';
    hdr.innerHTML = '📅 ' + date + (date === state.serverToday ? ' (오늘)' : '');
    list.appendChild(hdr);

    recs.filter(function(r) { return r.date === date; })
      .sort(function(a, b) {
        if (a.defectInfo && !b.defectInfo) return -1;
        if (!a.defectInfo && b.defectInfo) return  1;
        return b.recordId.localeCompare(a.recordId);
      })
      .forEach(function(rec) { list.appendChild(buildDoneCard(rec)); });
  });

  document.getElementById('done-count').innerText =
    state.records.filter(function(r) {
      return (r.status === '작성완료' || r.status === '검토완료' || r.status === '취소요청') &&
             (userRoles[r.factoryId] || 0) >= 1;
    }).length;
}

/**
 * 완료 카드 DOM 생성
 */
function buildDoneCard(rec) {
  // 해당 레코드 공장에서의 현재 사용자 권한
  var userRoles = (state.user && state.user.factoryRoles) ? state.user.factoryRoles : {};
  var role = parseInt(userRoles[rec.factoryId] || 1);

  // 공장 뱃지 (현재 공장이 아닌 경우에만 표시)
  var factory = state.factories.find(function(f) { return f.id === rec.factoryId; });
  var factoryBadge = (rec.factoryId !== state.currentFactory && factory)
    ? '<span style="background:#8e44ad;color:white;font-size:10px;padding:2px 6px;border-radius:4px;margin-right:5px;">🏭 ' + factory.name + '</span>'
    : '';
  var wrap = document.createElement('div');
  wrap.className = 'done-card-wrap';
  wrap.id        = 'card-wrap-' + rec.recordId;

  // 부적합 미리보기
  var defectHtml = '', hasDefect = false;
  if (rec.defectInfo && rec.defectInfo !== 'undefined' && rec.defectInfo !== '') {
    try {
      var d = JSON.parse(rec.defectInfo);
      defectHtml =
        '<div class="defect-preview">' +
          '<strong>⚠️ 부적합: ' + d.item + '</strong><br>' +
          '내용: ' + d.content + '<br>' +
          '<span style="color:#27ae60;">✅ 조치: ' + d.action + '</span>' +
        '</div>';
      hasDefect = true;
    } catch (e) {}
  }

  // 스테퍼
  var s1 = 'step step-write';
  var hasReviewer = rec.reviewer && rec.reviewer !== '' && rec.reviewer !== '-';
  var s2 = (hasReviewer && (rec.status === '검토완료' || rec.status === '검토취소요청' || rec.status === '승인완료')) ? 'step step-review' : 'step';
  var s3 = rec.status === '승인완료' ? 'step step-approve' : 'step';

  var badgeColor = rec.status === '승인완료' ? '#27ae60'
                 : rec.status === '검토완료' ? '#2980b9'
                 : rec.status === '취소요청' ? '#c0392b'
                 : rec.status === '검토취소요청' ? '#8e44ad'
                 : '#e67e22';

  var btns = '';
  if (!state.selectMode) {

    // 검토 버튼 — 권한2 전용, 작성완료 상태, 본인 문서 제외, 권한2는 권한3 문서 검토 불가
    var canReview = role === 2
      && rec.status === '작성완료'
      && rec.writerId !== state.user.id
      && !(parseInt(rec.writerRole || '1') >= 3);
    if (canReview) {
      btns += '<button class="action-btn btn-review" onclick="doAction(\'' + rec.recordId + '\',\'REVIEW\',\'' + rec.title + '\')">검토</button>';
    }

    // 검토취소 — 검토완료/검토취소요청 상태 + (본인이 검토했거나 권한3)
    if (rec.status === '검토완료' || rec.status === '검토취소요청') {
      var canCancelReview = role >= 3 || (role >= 2 && rec.reviewer === state.user.name);
      if (canCancelReview) {
        btns += '<button class="btn-ghost btn-ghost-review" onclick="doAction(\'' + rec.recordId + '\',\'CANCEL_REVIEW\',\'' + rec.title + '\')">검토취소</button>';
      }
    }

    // 승인 버튼 — 권한3, 검토완료 또는 작성완료 상태
    if (role >= 3 && (rec.status === '검토완료' || rec.status === '작성완료')) {
      btns += '<button class="action-btn btn-approve" onclick="doAction(\'' + rec.recordId + '\',\'APPROVE\',\'' + rec.title + '\')">승인</button>';
    }

    // 승인취소 — 권한3, 승인완료 또는 취소요청 상태
    if (role >= 3 && (rec.status === '승인완료' || rec.status === '취소요청')) {
      btns += '<button class="btn-ghost btn-ghost-approve" onclick="doAction(\'' + rec.recordId + '\',\'REVOKE\',\'' + rec.title + '\')">승인취소</button>';
    }

    // 작성취소 — 작성완료 상태 + 본인 작성 문서만 (작성중으로 복귀, 서명 초기화)
    if (rec.status === '작성완료' && rec.writerId === state.user.id) {
      btns += '<button class="btn-ghost btn-ghost-danger" onclick="doAction(\'' + rec.recordId + '\',\'CANCEL\',\'' + rec.title + '\')">작성취소</button>';
    }

    // 취소요청 — 권한1, 승인완료 상태, 본인 문서 (권한2 이상은 직접 승인취소 가능)
    if (role === 1 && rec.status === '승인완료' && rec.writerId === state.user.id) {
      btns += '<button class="btn-ghost btn-ghost-danger" onclick="doAction(\'' + rec.recordId + '\',\'REQUEST_REVOKE\',\'' + rec.title + '\')">취소요청</button>';
    }

    // 취소요청 상태: 본인은 요청취소, 권한3은 반려 가능
    if (rec.status === '취소요청') {
      if (rec.writerId === state.user.id) {
        btns += '<button class="btn-ghost" onclick="doAction(\'' + rec.recordId + '\',\'CANCEL_REVOKE_REQUEST\',\'' + rec.title + '\')">요청취소</button>';
      }
      if (role >= 3) {
        btns += '<button class="btn-ghost btn-ghost-danger" onclick="doAction(\'' + rec.recordId + '\',\'REJECT_REVOKE_REQUEST\',\'' + rec.title + '\')">요청반려</button>';
      }
    }

    // 검토취소요청 — 권한1, 검토완료 상태, 본인 문서 (권한2 이상은 직접 검토취소 가능)
    if (rec.status === '검토완료' && rec.writerId === state.user.id && role === 1) {
      btns += '<button class="btn-ghost btn-ghost-danger" onclick="doAction(\'' + rec.recordId + '\',\'REQUEST_REVIEW_CANCEL\',\'' + rec.title + '\')">검토취소요청</button>';
    }

    // 검토취소요청 상태: 본인은 요청취소, 검토취소 가능한 사람(본인이 검토했거나 권한3)만 반려 가능
    if (rec.status === '검토취소요청') {
      if (rec.writerId === state.user.id) {
        btns += '<button class="btn-ghost" onclick="doAction(\'' + rec.recordId + '\',\'CANCEL_REVIEW_CANCEL_REQUEST\',\'' + rec.title + '\')">요청취소</button>';
      }
      if (role >= 3 || (role >= 2 && rec.reviewer === state.user.name)) {
        btns += '<button class="btn-ghost btn-ghost-danger" onclick="doAction(\'' + rec.recordId + '\',\'REJECT_REVIEW_CANCEL_REQUEST\',\'' + rec.title + '\')">요청반려</button>';
      }
    }

    // 삭제 — 작성완료 상태, 본인 문서, 같은 날짜+logId에 중복 레코드 존재
    if (rec.status === '작성완료' && rec.writerId === state.user.id) {
      var isDupDone = state.records.filter(function(r) {
        return r.logId === rec.logId && r.date === rec.date;
      }).length > 1;
      if (isDupDone) {
        btns += '<button class="btn-ghost btn-ghost-danger" onclick="deleteRecord(\'' + rec.recordId + '\',\'' + rec.title + '\')">🗑 삭제</button>';
      }
    }
  }

  var checkbox = (state.selectMode && (rec.status !== '승인완료' || state.revokeMode))
    ? '<input type="checkbox" class="card-check date-' + rec.date + '" data-id="' + rec.recordId +
      '" data-status="' + rec.status + '" onchange="updateCount()">'
    : '';

  wrap.innerHTML =
    '<div class="done-card' + (hasDefect ? ' defect' : '') + '">' +
      checkbox +
      '<div class="done-card-clickable" onclick="viewRecord(\'' + rec.recordId + '\',\'' + rec.logId + '\',\'' + rec.title + '\')">' +
        '<span class="status-badge" style="background:' + badgeColor + '">' + rec.status + '</span>' +
        '<h4 style="margin:5px 0;font-size:14px;">' + factoryBadge + rec.title + '</h4>' +
        '<div style="font-size:11px;color:#888;">작성: ' + rec.writerName +
          (rec.reviewer  ? ' · 검토: ' + rec.reviewer  : '') +
          (rec.approver  ? ' · 승인: ' + rec.approver  : '') +
        '</div>' +
        defectHtml +
      '</div>' +
      '<div style="text-align:right;flex-shrink:0;">' +
        '<div class="stepper"><span class="' + s1 + '">작성</span><span class="' + s2 + '">검토</span><span class="' + s3 + '">승인</span></div>' +
        '<div style="margin-top:8px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;">' + btns + '</div>' +
      '</div>' +
    '</div>';

  return wrap;
}

/**
 * 미작성/작성중 일지 삭제
 */
function deleteRecord(recordId, title) {
  if (!confirm('[' + title + '] 이 일지를 삭제하시겠습니까?\n삭제 후 복구할 수 없습니다.')) return;
  showLoading('삭제 중...');
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoading();
      if (res.success) {
        state.records = state.records.filter(function(r) { return r.recordId !== recordId; });
        renderLists();
        showToast('삭제 완료', 'success');
      } else {
        showToast(res.message || '삭제 실패', 'error');
      }
    })
    .withFailureHandler(function() {
      hideLoading();
      showToast('서버 통신 오류', 'error');
    })
    .deleteRecord(recordId);
}

/**
 * 단건 결재 액션 실행
 */
function doAction(recordId, action, title) {
  var msgs = {
    CANCEL:                      '작성을 취소하시겠습니까? 작성중 상태로 돌아갑니다.',
    REVIEW:                      '검토 처리하시겠습니까?',
    CANCEL_REVIEW:               '검토를 취소하시겠습니까?',
    APPROVE:                     '승인 처리하시겠습니까?',
    REVOKE:                      '승인을 취소하시겠습니까?',
    REQUEST_REVOKE:              '관리자에게 승인 취소를 요청하시겠습니까?',
    CANCEL_REVOKE_REQUEST:       '승인 취소 요청을 철회하시겠습니까? 승인완료 상태로 유지됩니다.',
    REJECT_REVOKE_REQUEST:       '승인 취소 요청을 반려하시겠습니까? 승인완료 상태로 유지됩니다.',
    REQUEST_REVIEW_CANCEL:       '검토자에게 검토 취소를 요청하시겠습니까?',
    CANCEL_REVIEW_CANCEL_REQUEST:'검토 취소 요청을 철회하시겠습니까? 검토완료 상태로 유지됩니다.',
    REJECT_REVIEW_CANCEL_REQUEST:'검토 취소 요청을 반려하시겠습니까? 검토완료 상태로 유지됩니다.'
  };
  if (!confirm('[' + title + '] ' + (msgs[action] || '처리하시겠습니까?'))) return;

  showCardLoading(recordId);
  google.script.run
    .withSuccessHandler(function(res) {
      hideCardLoading(recordId);
      if (res.success) {
        if (action === 'CANCEL') {
          // 작성완료 → 작성중 복귀 (서명 초기화는 백엔드에서 처리)
          state.records.forEach(function(r) {
            if (r.recordId !== recordId) return;
            r.status   = '작성중';
            r.reviewer = '';
            r.approver = '';
          });
          // 작성중 상태는 done 탭이 아닌 todo 탭으로 이동하므로 양쪽 갱신
          renderLists();
        } else {
          state.records.forEach(function(r) {
            if (r.recordId !== recordId) return;
            if (action === 'CANCEL_REVIEW')               { r.status = '작성완료';    r.reviewer = ''; }
            if (action === 'REVIEW')                      { r.status = '검토완료';    r.reviewer = state.user.name; }
            if (action === 'APPROVE')                     { r.status = '승인완료';    r.approver = state.user.name; }
            if (action === 'REVOKE')                      { r.status = '작성중';      r.reviewer = ''; r.approver = ''; }
            if (action === 'REQUEST_REVOKE')              { r.status = '취소요청'; }
            if (action === 'CANCEL_REVOKE_REQUEST')       { r.status = '승인완료'; }
            if (action === 'REJECT_REVOKE_REQUEST')       { r.status = '승인완료'; }
            if (action === 'REQUEST_REVIEW_CANCEL')       { r.status = '검토취소요청'; }
            if (action === 'CANCEL_REVIEW_CANCEL_REQUEST'){ r.status = '검토완료'; }
            if (action === 'REJECT_REVIEW_CANCEL_REQUEST'){ r.status = '검토완료'; }
          });
          renderLists();
        }
        showToast('처리 완료!', 'success');
      } else {
        alert(res.message);
      }
    })
    .withFailureHandler(function() {
      hideCardLoading(recordId);
      alert('서버 통신 오류');
    })
    .processRecordAction(recordId, action, state.user.id, state.user.name, getCurrentRole());
}
</script>
