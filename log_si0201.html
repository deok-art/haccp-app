function initSi0201Form(date, savedJson) {
  var saved = {};
  try { if (savedJson) saved = JSON.parse(savedJson); } catch(e) {}
  document.getElementById('si0201-date').value     = date || state.serverToday;
  document.getElementById('si0201-writer').value   = state.user.name;
  document.getElementById('si0201-location').value = saved.location || SI0201_CONFIG.location;
  document.getElementById('si0201-period').value   = SI0201_CONFIG.period;
  initFormEngine(SI0201_CONFIG, 'si0201-groups-container', savedJson);
}
