// ── 폼 초기화 ──────────────────────────────────────────
function initSi0201Form(date, savedJson) {
  document.getElementById('si0201-date').value     = date || state.serverToday;
  document.getElementById('si0201-writer').value   = state.user.name;
  document.getElementById('si0201-location').value = '작업장';
  document.getElementById('si0201-period').value   = '일 1회';

  var saved = {};
  if (savedJson) { try { saved = JSON.parse(savedJson); } catch(e) {} }

  SI0201_GROUPS.forEach(function(grp) {
    grp.items.forEach(function(item) {
      var s = (saved.items || {})[item.key] || {};
      formState.checkData[item.key]    = s.result       || 'ok';
      formState.defectTexts[item.key]  = s.defectText   || '';
      formState.actionTexts[item.key]  = s.actionText   || '';
      formState.defectPhotos[item.key] = s.defectPhoto  || '';
      formState.actionPhotos[item.key] = s.actionPhoto  || '';
    });
  });
  if (saved.location) document.getElementById('si0201-location').value = saved.location;

  renderSi0201Groups();
}

// ── 그룹 렌더링 ────────────────────────────────────────
function renderSi0201Groups() {
  var container = document.getElementById('si0201-groups-container');
  if (!container) return;
  container.innerHTML = '';

  SI0201_GROUPS.forEach(function(grp) {
    var groupEl = document.createElement('div');
    groupEl.style.cssText = 'border:1px solid #e0e0e0;border-radius:10px;margin-bottom:10px;overflow:hidden;';

    var header = document.createElement('div');
    header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f5f7fa;cursor:pointer;';
    header.innerHTML =
      '<span style="font-size:13px;font-weight:600;color:#333;">' + grp.group + '</span>' +
      '<span class="si0201-arrow" style="font-size:12px;color:#aaa;transition:transform 0.2s;">▼</span>';
    header.onclick = function() { toggleSi0201Group(header); };

    var body = document.createElement('div');
    body.style.cssText = 'padding:10px 12px;';

    grp.items.forEach(function(item) {
      body.appendChild(buildSi0201ItemEl(item));
    });

    groupEl.appendChild(header);
    groupEl.appendChild(body);
    container.appendChild(groupEl);
  });
}

// ── 그룹 접기/펼치기 ───────────────────────────────────
function toggleSi0201Group(header) {
  var body  = header.nextElementSibling;
  var arrow = header.querySelector('.si0201-arrow');
  var open  = body.style.display !== 'none';
  body.style.display    = open ? 'none' : '';
  arrow.style.transform = open ? 'rotate(-90deg)' : '';
}

// ── 적합/부적합 선택 ───────────────────────────────────
function selectSi0201Result(key, result) {
  formState.checkData[key] = result;
  document.getElementById('si0201-ok-' + key).classList.toggle('selected', result === 'ok');
  document.getElementById('si0201-ng-' + key).classList.toggle('selected', result === 'ng');

  var itemEl  = document.getElementById('si0201-item-' + key);
  var ngArea  = document.getElementById('si0201-ng-area-' + key);
  if (!ngArea) return;

  if (result === 'ng') {
    ngArea.classList.remove('hidden');
    itemEl.style.borderColor = '#e74c3c';
    var dtEl = document.getElementById('si0201-defect-text-' + key);
    if (dtEl) dtEl.focus();
  } else {
    ngArea.classList.add('hidden');
    itemEl.style.borderColor = '#eee';
  }
}

// ── 전체 적합 ──────────────────────────────────────────
function setAllSi0201Ok() {
  SI0201_GROUPS.forEach(function(grp) {
    grp.items.forEach(function(item) { selectSi0201Result(item.key, 'ok'); });
  });
  showToast('전체 항목을 적합으로 설정했습니다.', 'success');
}

// ── 데이터 수집 ────────────────────────────────────────
function collectSi0201Data() {
  var items = {};
  SI0201_GROUPS.forEach(function(grp) {
    grp.items.forEach(function(item) {
      var dtEl = document.getElementById('si0201-defect-text-' + item.key);
      var atEl = document.getElementById('si0201-action-text-' + item.key);
      items[item.key] = {
        result:      formState.checkData[item.key] || 'ok',
        defectText:  dtEl ? dtEl.value : '',
        actionText:  atEl ? atEl.value : '',
        defectPhoto: formState.defectPhotos[item.key] || '',
        actionPhoto: formState.actionPhotos[item.key] || ''
      };
    });
  });
  return {
    location: (document.getElementById('si0201-location') || {}).value || '작업장',
    items:    items
  };
}

// ── 검증 ───────────────────────────────────────────────
function validateSi0201(data) {
  var allItems = [];
  SI0201_GROUPS.forEach(function(grp) { grp.items.forEach(function(i) { allItems.push(i); }); });

  for (var i = 0; i < allItems.length; i++) {
    var item = allItems[i];
    var d    = data.items[item.key] || {};
    if (d.result === 'ng') {
      if (!d.defectText || !d.defectText.trim()) {
        showToast('[' + item.sub + '] 부적합 내용을 입력해주세요!', 'error');
        var el = document.getElementById('si0201-defect-text-' + item.key);
        if (el) el.focus();
        return false;
      }
      if (!d.actionText || !d.actionText.trim()) {
        showToast('[' + item.sub + '] 개선조치 내용을 입력해주세요!', 'error');
        var el2 = document.getElementById('si0201-action-text-' + item.key);
        if (el2) el2.focus();
        return false;
      }
    }
  }
  return true;
}

// ── 부적합 요약 ────────────────────────────────────────
function getSi0201DefectSummary(data) {
  var allItems = [];
  SI0201_GROUPS.forEach(function(grp) { grp.items.forEach(function(i) { allItems.push(i); }); });
  var ngItems = allItems.filter(function(item) { return (data.items[item.key] || {}).result === 'ng'; });
  if (!ngItems.length) return '';
  var first = ngItems[0];
  var d     = data.items[first.key] || {};
  return JSON.stringify({
    item:    ngItems.length > 1 ? '[' + first.sub + '] ' + first.desc + ' 외 ' + (ngItems.length-1) + '건'
                                : '[' + first.sub + '] ' + first.desc,
    content: d.defectText || '',
    action:  d.actionText || ''
  });
}

// ── 인쇄용 HTML (A4 HACCP 양식) ────────────────────────
function buildSi0201PrintHtml(rec, dataJsonStr, sigRes) {
  var data = {};
  try { data = JSON.parse(dataJsonStr); } catch(e) {}
  if (!data || !data.items) return '';

  // ── 결재란 ──────────────────────────────────────────
  var writerSig   = state.user.signature && rec.writerId === state.user.id ? state.user.signature : '';
  var reviewerSig = (sigRes && sigRes.reviewerSignature) ? sigRes.reviewerSignature : '';
  var approverSig = (sigRes && sigRes.approverSignature) ? sigRes.approverSignature : '';
  var writerLabel   = (sigRes && sigRes.writerTitle)   || state.user.title || state.user.rank || '작성';
  var reviewerLabel = (sigRes && sigRes.reviewerTitle) || '검토';
  var approverLabel = (sigRes && sigRes.approverTitle) || '승인';
  var hasReviewer = rec.reviewer && rec.reviewer !== '' && rec.reviewer !== '-';
  var hasApprover = rec.approver && rec.approver !== '' && rec.approver !== '-';

  var signCols = [];
  signCols.push({
    role: '작성',
    title: writerLabel || '-',
    name: rec.writerName || '-',
    date: rec.date || '-',
    sig: writerSig || ''
  });
  if (hasReviewer) {
    signCols.push({
      role: '검토',
      title: reviewerLabel || '-',
      name: rec.reviewer || '-',
      date: rec.date || '-',
      sig: reviewerSig || ''
    });
  }
  signCols.push({
    role: '승인',
    title: approverLabel || '-',
    name: hasApprover ? (rec.approver || '-') : '-',
    date: hasApprover ? (rec.date || '-') : '-',
    sig: hasApprover ? (approverSig || '') : ''
  });

  var logoSrc = (state.settings && state.settings.Logo) ? state.settings.Logo : '';
  var logoHtml = logoSrc
    ? '<img src="' + logoSrc + '" class="pdoc-logo" alt="Company Logo" onerror="this.style.display=\'none\'">'
    : '<span style="font-size:10pt;color:#777;">LOGO</span>';
  function fitApproveText(text) {
    var v = String(text || '-');
    var len = v.length;
    var cls = 'pdoc-fit-md';
    if (len >= 18) cls = 'pdoc-fit-xs';
    else if (len >= 13) cls = 'pdoc-fit-sm';
    return '<span class="pdoc-fit ' + cls + '">' + v + '</span>';
  }
  var approveColsHtml = signCols.map(function(c) {
    return (
      '<td class="pdoc-role-col" rowspan="4">' + c.role + '</td>' +
      '<td class="pdoc-val-col">' + fitApproveText(c.title || '-') + '</td>'
    );
  }).join('');
  var approveSigHtml = signCols.map(function(c) {
    return (
      '<td class="pdoc-sign-col">' +
        (c.sig ? '<img src="' + c.sig + '" alt="서명" onerror="this.style.display=\'none\'">' : '') +
      '</td>'
    );
  }).join('');
  var approveNameHtml = signCols.map(function(c) {
    return '<td class="pdoc-val-col">' + fitApproveText(c.name || '-') + '</td>';
  }).join('');
  var approveDateHtml = signCols.map(function(c) {
    return '<td class="pdoc-val-col">' + fitApproveText(c.date || '-') + '</td>';
  }).join('');
  var docApproveTable =
    '<table class="pdoc-approve pdoc-approve-grid">' +
      '<tr>' + approveColsHtml + '</tr>' +
      '<tr>' + approveSigHtml + '</tr>' +
      '<tr>' + approveNameHtml + '</tr>' +
      '<tr>' + approveDateHtml + '</tr>' +
    '</table>';

  // ── 2-column 점검표 ─────────────────────────────────
  // 그룹 절반씩 나눠서 좌/우 컬럼
  var mid   = Math.ceil(SI0201_GROUPS.length / 2);
  var left  = SI0201_GROUPS.slice(0, mid);
  var right = SI0201_GROUPS.slice(mid);

  function buildCheckCol(groups) {
    var rows = '';
    groups.forEach(function(grp) {
      rows += '<tr class="pgrp-header"><td colspan="3">' + grp.group + '</td></tr>';
      grp.items.forEach(function(item) {
        var d   = data.items[item.key] || {};
        var res = d.result === 'ng'
          ? '<span class="png">×</span>'
          : '<span class="pok">○</span>';
        rows +=
          '<tr>' +
            '<td class="pitem-sub">' + item.sub + '</td>' +
            '<td class="pitem-desc">' + item.desc + '</td>' +
            '<td class="pitem-result">' + res + '</td>' +
          '</tr>';
      });
    });
    return '<table class="pcheck">' + rows + '</table>';
  }

  var checkTableHtml =
    '<div class="pcheck-wrap">' +
      buildCheckCol(left) +
      buildCheckCol(right) +
    '</div>';

  // ── 부적합 항목 모음 ────────────────────────────────
  var ngItems = [];
  SI0201_GROUPS.forEach(function(grp) {
    grp.items.forEach(function(item) {
      var d = data.items[item.key] || {};
      if (d.result === 'ng') ngItems.push({ grp: grp.group, item: item, d: d });
    });
  });

  var defectSection = '';
  if (ngItems.length) {
    var defectCards = ngItems.map(function(ni) {
      var defImg = ni.d.defectPhoto
        ? '<img src="' + ni.d.defectPhoto + '" class="pdefect-img" onerror="this.style.display=\'none\'">'
        : '';
      var actImg = ni.d.actionPhoto
        ? '<img src="' + ni.d.actionPhoto + '" class="pdefect-img" onerror="this.style.display=\'none\'">'
        : '';
      return (
        '<div class="pdefect-card">' +
          '<div class="pdefect-header">' +
            '<span class="pdefect-grp">' + ni.grp + '</span>' +
            '<span class="pdefect-title">' + ni.item.sub + '</span>' +
            '<span class="pdefect-desc">' + ni.item.desc + '</span>' +
          '</div>' +
          '<div class="pdefect-body">' +
            '<div class="pdefect-col">' +
              '<div class="pdefect-label-ng">🚨 부적합 내용</div>' +
              '<div class="pdefect-text">' + (ni.d.defectText || '-') + '</div>' +
              defImg +
            '</div>' +
            '<div class="pdefect-col">' +
              '<div class="pdefect-label-act">🔧 개선조치 내용</div>' +
              '<div class="pdefect-text">' + (ni.d.actionText || '-') + '</div>' +
              actImg +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }).join('');

    defectSection =
      '<div class="pdefect-section">' +
        '<div class="pdefect-section-title">부적합 및 개선조치 내역 (' + ngItems.length + '건)</div>' +
        defectCards +
      '</div>';
  }

  // ── 전체 조합 ───────────────────────────────────────

  var pageCount = defectSection ? 2 : 1;

  var firstPageHtml =
    '<div class="print-page">' +
      '<table class="pdoc-header">' +
        '<tr>' +
          '<td class="pdoc-logo-cell">' + logoHtml + '</td>' +
          '<td class="pdoc-title-cell">이물관리 점검표</td>' +
          '<td class="pdoc-approve-cell">' + docApproveTable + '</td>' +
        '</tr>' +
      '</table>' +
      // 기본정보
      '<table class="pinfo">' +
        '<tr>' +
          '<td class="pinfo-label">점검일자</td><td>' + rec.date + '</td>' +
          '<td class="pinfo-label">점검자</td><td>' + (rec.writerName || '-') + '</td>' +
          '<td class="pinfo-label">점검위치</td><td>' + (data.location || '작업장') + '</td>' +
          '<td class="pinfo-label">점검주기</td><td>일 1회</td>' +
        '</tr>' +
      '</table>' +

      // 범례
      '<div class="plegend">○ 적합 &nbsp;|&nbsp; × 부적합</div>' +

      // 2-column 점검표
      checkTableHtml +
      '<table class="pfoot-table">' +
        '<tr>' +
          '<td class="pfoot-cell pfoot-left">문서번호: PBⅡ-SI-02-01</td>' +
          '<td class="pfoot-cell pfoot-center">페이지 1 / ' + pageCount + '</td>' +
          '<td class="pfoot-cell pfoot-right">Rev.1</td>' +
        '</tr>' +
      '</table>' +
    '</div>';

  // 부적합은 항상 다음 페이지로 강제
  var secondPageHtml = '';
  if (defectSection) {
    secondPageHtml =
      '<div class="print-page">' +
        '<table class="pdoc-header">' +
          '<tr>' +
            '<td class="pdoc-logo-cell">' + logoHtml + '</td>' +
            '<td class="pdoc-title-cell">이물관리 점검표 - 부적합/개선조치</td>' +
            '<td class="pdoc-approve-cell">' + docApproveTable + '</td>' +
          '</tr>' +
        '</table>' +
        defectSection +
        '<table class="pfoot-table">' +
          '<tr>' +
            '<td class="pfoot-cell pfoot-left">문서번호: PBⅡ-SI-02-01</td>' +
            '<td class="pfoot-cell pfoot-center">페이지 2 / ' + pageCount + '</td>' +
            '<td class="pfoot-cell pfoot-right">Rev.1</td>' +
          '</tr>' +
        '</table>' +
      '</div>';
  }

  return firstPageHtml + secondPageHtml;
}

// ── 뷰어 HTML ──────────────────────────────────────────
function buildSi0201ViewHtml(rec, dataJsonStr, title, sigRes) {
  var data = {};
  try { data = JSON.parse(dataJsonStr); } catch(e) {}
  if (!data || !data.items) return '<p style="color:#999;text-align:center;padding:20px;">작성된 내용이 없습니다.</p>';

  var groupHtml = SI0201_GROUPS.map(function(grp) {
    var rows = grp.items.map(function(item) {
      var d          = data.items[item.key] || {};
      var isNg       = d.result === 'ng';
      var resultHtml = isNg
        ? '<span class="result-ng">× 부적합</span>'
        : '<span class="result-ok">○ 적합</span>';

      var ngDetail = '';
      if (isNg) {
        var defPhotoHtml = d.defectPhoto
          ? '<img src="' + d.defectPhoto + '" style="max-width:100%;max-height:120px;border-radius:4px;margin-top:4px;display:block;">'
          : '';
        var actPhotoHtml = d.actionPhoto
          ? '<img src="' + d.actionPhoto + '" style="max-width:100%;max-height:120px;border-radius:4px;margin-top:4px;display:block;">'
          : '';
        ngDetail =
          '<tr><td colspan="2" style="padding:0 10px 10px 20px;background:#fff8f8;">' +
            '<div style="border-left:3px solid #e74c3c;padding-left:10px;margin-bottom:8px;">' +
              '<div style="font-size:11px;font-weight:700;color:#e74c3c;margin-bottom:2px;">🚨 부적합 내용</div>' +
              '<div style="font-size:12px;">' + (d.defectText || '-') + '</div>' +
              defPhotoHtml +
            '</div>' +
            '<div style="border-left:3px solid #2980b9;padding-left:10px;">' +
              '<div style="font-size:11px;font-weight:700;color:#2980b9;margin-bottom:2px;">🔧 개선조치 내용</div>' +
              '<div style="font-size:12px;">' + (d.actionText || '-') + '</div>' +
              actPhotoHtml +
            '</div>' +
          '</td></tr>';
      }

      return '<tr>' +
        '<td style="padding:8px 10px;">' +
          '<span style="font-size:13px;font-weight:600;">' + item.sub + '</span>' +
          '<span style="color:#888;font-size:11px;margin-left:6px;">' + item.desc + '</span>' +
        '</td>' +
        '<td style="text-align:center;padding:8px;white-space:nowrap;">' + resultHtml + '</td>' +
      '</tr>' + ngDetail;
    }).join('');

    return '<tr><td colspan="2" style="background:#f5f7fa;padding:7px 10px;font-size:12px;font-weight:700;color:#444;">' +
      grp.group + '</td></tr>' + rows;
  }).join('');

  return '<div class="view-form-wrap">' +
    '<table class="view-header-table">' +
      '<tr><td class="label">문서명</td><td>' + title + '</td>' +
          '<td class="label">점검일</td><td>' + (rec.date || '-') + '</td></tr>' +
      '<tr><td class="label">점검자</td><td>' + (rec.writerName || '-') + '</td>' +
          '<td class="label">점검위치</td><td>' + (data.location || '작업장') + '</td></tr>' +
    '</table>' +
    '<table class="view-check-table" style="margin-top:12px;">' +
      '<thead><tr>' +
        '<th style="text-align:left;padding:8px 10px;">점검 항목</th>' +
        '<th style="width:80px;">결과</th>' +
      '</tr></thead>' +
      '<tbody>' + groupHtml + '</tbody>' +
    '</table>' +
    buildSigRowHtml(rec, sigRes) +
  '</div>';
}
</script>
