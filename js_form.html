<script>
// ════════════════════════════════════════════════════════
//  js_form.html — 폼 라우팅 / 수집·검증 / 제출 / 뷰어
// ════════════════════════════════════════════════════════

// 주간 양식 logId 목록
var WEEKLY_LOG_IDS = ['si0102hs', 'si0102dr', 'si0102wc'];

/**
 * 날짜 문자열(yyyy-MM-dd) → 해당 주 월요일 문자열 반환
 */
function computeWeekStart(dateStr) {
  var d = new Date(dateStr + 'T00:00:00+09:00');
  var day = d.getDay(); // 0=일,1=월,...6=토
  var diff = (day === 0) ? -6 : 1 - day; // 월요일 기준 이동
  d.setDate(d.getDate() + diff);
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

/**
 * 날짜 문자열 → 한글 요일 반환 (월/화/수/목/금/토/일)
 */
function getKorDayOfWeek(dateStr) {
  var d = new Date(dateStr + 'T00:00:00+09:00');
  return ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
}

function openForm(recordId, logId, title, date) {
  currentLogInfo = { logId: logId, logTitle: title };

  // 주간 양식: getOrCreateWeeklyRecord 호출 후 recordId를 서버 반환값으로 갱신
  if (WEEKLY_LOG_IDS.indexOf(logId) !== -1) {
    currentRecordId = recordId; // 임시, 서버 응답 후 갱신
    var weekStart = computeWeekStart(date || state.serverToday);
    showLoading('불러오는 중...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          hideLoading();
          showToast('일지를 불러오지 못했습니다.', 'error');
          return;
        }
        currentRecordId = res.recordId; // 실제 recordId 갱신

        var formArea = document.getElementById('form-scroll-area');
        document.getElementById('form-title').innerText = title;

        if (logId === 'si0102hs') {
          var tpl = document.getElementById('tpl-si0102hs');
          if (tpl) formArea.innerHTML = tpl.innerHTML;
          if (typeof initSi0102hsForm === 'function') initSi0102hsForm(date, res.dataJson, weekStart);
        } else if (logId === 'si0102dr') {
          var tpl = document.getElementById('tpl-si0102dr');
          if (tpl) formArea.innerHTML = tpl.innerHTML;
          if (typeof initSi0102drForm === 'function') initSi0102drForm(date, res.dataJson, weekStart);
        } else if (logId === 'si0102wc') {
          var tpl = document.getElementById('tpl-si0102wc');
          if (tpl) formArea.innerHTML = tpl.innerHTML;
          if (typeof initSi0102wcForm === 'function') initSi0102wcForm(date, res.dataJson, weekStart);
        }

        hideLoading();
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('form-screen').classList.remove('hidden');
      })
      .withFailureHandler(function() {
        hideLoading();
        showToast('네트워크가 불안정합니다. 다시 시도해주세요.', 'error');
      })
      .getOrCreateWeeklyRecord(logId, title, state.currentFactory || 'pb2', weekStart, state.user.id, state.user.name);
    return;
  }

  currentRecordId = recordId;

  // 기존 저장 데이터 불러오기 (작성취소 후 재진입 시 데이터 유지)
  showLoading('불러오는 중...');
  google.script.run
    .withSuccessHandler(function(res) {
      formState = { checkData: {}, defectTexts: {}, actionTexts: {}, defectPhotos: {}, actionPhotos: {} };

      // 저장된 데이터가 있으면 formState에 복원
      if (res && res.success && res.dataJson) {
        try {
          var saved = JSON.parse(res.dataJson);
          if (saved.items) {
            Object.keys(saved.items).forEach(function(key) {
              var item = saved.items[key];
              formState.checkData[key]    = item.result     || 'ok';
              formState.defectTexts[key]  = item.defectText || '';
              formState.actionTexts[key]  = item.actionText || '';
              formState.defectPhotos[key] = item.defectPhoto|| '';
              formState.actionPhotos[key] = item.actionPhoto|| '';
            });
          }
          formState._savedTemp = saved.temperature || '';
          formState._savedMemo = saved.memo        || '';
        } catch (e) {}
      }

      var formArea = document.getElementById('form-scroll-area');
      document.getElementById('form-title').innerText = title;

      if (logId === 'si0201') {
        var tpl = document.getElementById('tpl-si0201');
        if (tpl) formArea.innerHTML = tpl.innerHTML;
        if (typeof initSi0201Form === 'function') initSi0201Form(date, res && res.dataJson);
      } else {
        if (genericFormHtml) formArea.innerHTML = genericFormHtml;
        initGenericForm(date);
      }

      hideLoading();
      document.getElementById('main-screen').classList.add('hidden');
      document.getElementById('form-screen').classList.remove('hidden');
    })
    .withFailureHandler(function() {
      // 불러오기 실패해도 빈 폼으로 진입
      formState = { checkData: {}, defectTexts: {}, actionTexts: {}, defectPhotos: {}, actionPhotos: {} };
      var formArea = document.getElementById('form-scroll-area');
      document.getElementById('form-title').innerText = title;
      if (genericFormHtml) formArea.innerHTML = genericFormHtml;
      initGenericForm(date);
      hideLoading();
      document.getElementById('main-screen').classList.add('hidden');
      document.getElementById('form-screen').classList.remove('hidden');
    })
    .getRecordDetail(recordId, logId);
}

window.openForm = openForm;

// ── 기본 위생점검 양식 (P01) ───────────────────────────
function initGenericForm(date) {
  document.getElementById('f-date').value   = date || state.serverToday;
  document.getElementById('f-writer').value = state.user.name;
  document.getElementById('f-temp').value   = formState._savedTemp || '';
  document.getElementById('f-memo').value   = formState._savedMemo || '';
  CHECK_ITEMS.forEach(function(item) {
    if (!formState.checkData[item.key]) formState.checkData[item.key] = 'ok';
  });
  renderGenericCheckItems();
}

function renderGenericCheckItems() {
  var container = document.getElementById('check-items-container');
  if (!container) return;
  container.innerHTML = '';

  CHECK_ITEMS.forEach(function(item) {
    var isNg = formState.checkData[item.key] === 'ng';
    var row  = document.createElement('div');
    row.className = 'check-item-row';
    row.id        = 'row-' + item.key;
    row.innerHTML =
      '<div class="check-item-label">' + item.label + '</div>' +
      '<div class="toggle-group">' +
        '<button class="toggle-btn ok' + (!isNg ? ' selected' : '') + '" id="btn-ok-' + item.key +
          '" onclick="selectGenericResult(\'' + item.key + '\',\'ok\')">✔ 적합</button>' +
        '<button class="toggle-btn ng' + ( isNg ? ' selected' : '') + '" id="btn-ng-' + item.key +
          '" onclick="selectGenericResult(\'' + item.key + '\',\'ng\')">✘ 부적합</button>' +
      '</div>' +
      '<div class="defect-input-area' + (isNg ? '' : ' hidden') + '" id="defect-area-' + item.key + '">' +
        '<div class="defect-block">' +
          '<label class="ng-label">⚠️ 부적합 내용 <span style="color:var(--danger);">*필수</span></label>' +
          '<textarea id="defect-text-' + item.key + '" placeholder="부적합 내용을 입력하세요.">' +
            (formState.defectTexts[item.key] || '') + '</textarea>' +
          '<div class="photo-row">' +
            '<div id="defect-photo-preview-' + item.key + '">' + getPhotoHtml('defect', item.key) + '</div>' +
            '<button class="photo-add-btn" onclick="triggerPhoto(\'defect\',\'' + item.key + '\',\'camera\')"><span>📷</span>카메라</button>' +
            '<button class="photo-add-btn gallery-btn" onclick="triggerPhoto(\'defect\',\'' + item.key + '\',\'gallery\')"><span>🖼</span>갤러리</button>' +
            '<input type="file" accept="image/*" capture="environment" class="photo-input" id="photo-input-defect-camera-' + item.key + '" onchange="handlePhoto(\'defect\',\'' + item.key + '\',this,\'' + item.label + '\')">' +
            '<input type="file" accept="image/*" class="photo-input" id="photo-input-defect-gallery-' + item.key + '" onchange="handlePhoto(\'defect\',\'' + item.key + '\',this,\'' + item.label + '\')">' +
          '</div>' +
        '</div>' +
        '<div class="defect-block action-block">' +
          '<label class="ok-label">✅ 개선조치 내용 <span style="color:var(--danger);">*필수</span></label>' +
          '<textarea id="action-text-' + item.key + '" placeholder="개선조치 내용을 입력하세요.">' +
            (formState.actionTexts[item.key] || '') + '</textarea>' +
          '<div class="photo-row">' +
            '<div id="action-photo-preview-' + item.key + '">' + getPhotoHtml('action', item.key) + '</div>' +
            '<button class="photo-add-btn" onclick="triggerPhoto(\'action\',\'' + item.key + '\',\'camera\')"><span>📷</span>카메라</button>' +
            '<button class="photo-add-btn gallery-btn" onclick="triggerPhoto(\'action\',\'' + item.key + '\',\'gallery\')"><span>🖼</span>갤러리</button>' +
            '<input type="file" accept="image/*" capture="environment" class="photo-input" id="photo-input-action-camera-' + item.key + '" onchange="handlePhoto(\'action\',\'' + item.key + '\',this,\'' + item.label + '\')">' +
            '<input type="file" accept="image/*" class="photo-input" id="photo-input-action-gallery-' + item.key + '" onchange="handlePhoto(\'action\',\'' + item.key + '\',this,\'' + item.label + '\')">' +
          '</div>' +
        '</div>' +
      '</div>';
    container.appendChild(row);
  });
}

function selectGenericResult(key, result) {
  formState.checkData[key] = result;
  document.getElementById('btn-ok-' + key).classList.toggle('selected', result === 'ok');
  document.getElementById('btn-ng-' + key).classList.toggle('selected', result === 'ng');
  document.getElementById('defect-area-' + key).classList.toggle('hidden', result === 'ok');
  if (result === 'ng') document.getElementById('defect-text-' + key).focus();
}

function setAllOk() {
  CHECK_ITEMS.forEach(function(item) { selectGenericResult(item.key, 'ok'); });
  showToast('전체 항목을 적합으로 설정했습니다.', 'success');
}

// ── 데이터 수집 라우터 ─────────────────────────────────
function collectFormData() {
  if (currentLogInfo.logId === 'si0201')   return collectSi0201Data();
  if (currentLogInfo.logId === 'si0102hs') return collectSi0102hsData();
  if (currentLogInfo.logId === 'si0102dr') return collectSi0102drData();
  if (currentLogInfo.logId === 'si0102wc') return collectSi0102wcData();


  var data = {
    temperature: document.getElementById('f-temp').value,
    memo:        document.getElementById('f-memo').value,
    items:       {}
  };
  CHECK_ITEMS.forEach(function(item) {
    var dtEl = document.getElementById('defect-text-' + item.key);
    var atEl = document.getElementById('action-text-' + item.key);
    data.items[item.key] = {
      result:      formState.checkData[item.key],
      defectText:  dtEl ? dtEl.value : '',
      actionText:  atEl ? atEl.value : '',
      defectPhoto: formState.defectPhotos[item.key] || '',
      actionPhoto: formState.actionPhotos[item.key] || ''
    };
  });
  return data;
}

// ── 검증 라우터 ────────────────────────────────────────
function validateForm(data) {
  if (currentLogInfo.logId === 'si0201')   return validateSi0201(data);
  // 주간 양식: null=통과, string=에러메시지
  var weeklyValidators = {
    'si0102hs': validateSi0102hs,
    'si0102dr': validateSi0102dr,
    'si0102wc': validateSi0102wc
  };
  if (weeklyValidators[currentLogInfo.logId]) {
    var err = weeklyValidators[currentLogInfo.logId](data);
    if (err) { showToast(err, 'error'); return false; }
    return true;
  }


  if (!data.temperature && data.temperature !== 0) {
    showToast('온도를 입력해주세요!', 'error'); return false;
  }
  var tempVal = parseFloat(data.temperature);
  if (tempVal < -10 || tempVal > 50) {
    if (!confirm('입력한 온도(' + tempVal + '℃)가 정상 범위를 벗어났습니다. 계속하시겠습니까?')) return false;
  }
  for (var i = 0; i < CHECK_ITEMS.length; i++) {
    var item = CHECK_ITEMS[i];
    var d    = data.items[item.key];
    if (d.result === 'ng') {
      if (!d.defectText.trim()) { showToast('[' + item.label + '] 부적합 내용을 입력해주세요!', 'error'); return false; }
      if (!d.actionText.trim()) { showToast('[' + item.label + '] 개선조치 내용을 입력해주세요!', 'error'); return false; }
    }
  }
  return true;
}

// ── 부적합 요약 라우터 ─────────────────────────────────
function getDefectSummary(data) {
  if (currentLogInfo.logId === 'si0201')   return getSi0201DefectSummary(data);
  if (currentLogInfo.logId === 'si0102hs') return getSi0102hsDefectSummary(data);
  if (currentLogInfo.logId === 'si0102dr') return getSi0102drDefectSummary(data);
  if (currentLogInfo.logId === 'si0102wc') return getSi0102wcDefectSummary(data);


  for (var i = 0; i < CHECK_ITEMS.length; i++) {
    var item = CHECK_ITEMS[i];
    var d    = data.items[item.key];
    if (d && d.result === 'ng') {
      return JSON.stringify({ item: item.label, content: d.defectText, action: d.actionText });
    }
  }
  return '';
}

// ── 임시저장 후 나가기 ─────────────────────────────────
function saveDraftAndBack() {
  var data = collectFormData();

  // 나가기 전 전체 로딩으로 중복 액션 방지
  showLoading('임시저장 중...');

  function goBack() {
    hideLoading();
    document.getElementById('form-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
  }

  // 주간 양식: 해당 요일 데이터만 부분 저장 (isDraft=true → status 변경 없음)
  if (WEEKLY_LOG_IDS.indexOf(currentLogInfo.logId) !== -1) {
    if (navigator.onLine) {
      google.script.run
        .withSuccessHandler(function() { goBack(); showToast('임시저장 완료 ✔', 'success'); })
        .withFailureHandler(function() { goBack(); showToast('임시저장 실패', 'error'); })
        .saveWeeklyFormData(currentRecordId, currentLogInfo.logId, data.dayKey,
            JSON.stringify(data.items), '', state.user.id, state.user.name, true);
    } else {
      goBack();
      showToast('오프라인에서는 임시저장이 지원되지 않습니다.', 'info');
    }
    return;
  }

  var dataJson = JSON.stringify(data);

  if (navigator.onLine) {
    google.script.run
      .withSuccessHandler(function() {
        goBack();
        showToast('임시저장 완료 ✔', 'success');
      })
      .withFailureHandler(function() {
        idbAdd({ type: 'saveDraft', recordId: currentRecordId, logId: currentLogInfo.logId, dataJson: dataJson }, null);
        goBack();
        showToast('오프라인 저장됨', 'info');
      })
      .saveDraft(currentRecordId, currentLogInfo.logId, dataJson);
  } else {
    idbAdd({ type: 'saveDraft', recordId: currentRecordId, logId: currentLogInfo.logId, dataJson: dataJson },
      function() {
        goBack();
        showToast('오프라인 저장됨', 'info');
      });
  }
}

// ── 서명 확인 모달 ─────────────────────────────────────
function openSignModal() {
  var data = collectFormData();
  if (!validateForm(data)) return;

  openModal('✍ 서명 확인',
    '<p style="font-size:13px;color:#555;margin-bottom:10px;">아래 서명으로 제출합니다.<br>' +
    '<strong style="color:var(--danger);">제출 후에는 수정이 불가능합니다.</strong></p>' +
    '<div style="text-align:center;border:1px solid #ddd;border-radius:8px;padding:10px;background:#f9f9f9;margin-bottom:15px;">' +
      '<img src="' + state.user.signature + '" style="max-height:100px;max-width:100%;" alt="서명">' +
    '</div>' +
    '<div class="btn-group">' +
      '<button onclick="closeModal()" class="btn-flex" style="background:#eee;">취소</button>' +
      '<button onclick="submitForm()" class="btn-flex btn-primary" style="background:var(--success);">✔ 제출 확정</button>' +
    '</div>',
    true);
}

// ── 최종 제출 ──────────────────────────────────────────
function submitForm() {
  closeModal();

  var data       = collectFormData();
  var defectInfo = getDefectSummary(data);

  // 로컬 상태 즉시 반영
  state.records.forEach(function(r) {
    if (r.recordId === currentRecordId) {
      r.status = '작성완료';
      r.defectInfo = defectInfo;
      r.writerId   = state.user.id;
      r.writerName = state.user.name;
    }
  });

  // 화면 전환 후 전체 로딩 — 서버 응답까지 카드 액션 차단
  document.getElementById('form-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  renderLists();
  showLoading('서버 저장 중...');

  // 주간 양식: saveWeeklyFormData로 해당 요일만 저장
  if (WEEKLY_LOG_IDS.indexOf(currentLogInfo.logId) !== -1) {
    if (!navigator.onLine) {
      hideLoading();
      showToast('오프라인에서는 주간 일지를 저장할 수 없습니다.', 'error');
      return;
    }
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoading();
        if (res && res.success) {
          showToast('저장 완료 ✔', 'success');
          refreshRecords();
        } else {
          showToast('저장 실패: ' + (res && res.message || '서버 오류'), 'error');
        }
      })
      .withFailureHandler(function() {
        hideLoading();
        showToast('네트워크가 불안정합니다. 다시 시도해주세요.', 'error');
      })
      .saveWeeklyFormData(currentRecordId, currentLogInfo.logId, data.dayKey,
          JSON.stringify(data.items), defectInfo, state.user.id, state.user.name, false);
    return;
  }

  var dataJson = JSON.stringify(data);

  function doSave() {
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoading();
        if (res && res.success) {
          showToast('저장 완료 ✔', 'success');
        } else {
          saveToQueue();
          showToast('오프라인 저장됨', 'info');
        }
      })
      .withFailureHandler(function() {
        hideLoading();
        saveToQueue();
        showToast('오프라인 저장됨', 'info');
      })
      .saveFormData(currentRecordId, currentLogInfo.logId, dataJson, defectInfo, state.user.id, state.user.name);
  }

  function saveToQueue() {
    idbAdd({
      type: 'saveFormData',
      recordId:   currentRecordId,
      logId:      currentLogInfo.logId,
      dataJson:   dataJson,
      defectInfo: defectInfo
    }, null);
  }

  if (navigator.onLine) { doSave(); } else { hideLoading(); saveToQueue(); showToast('오프라인 저장됨', 'info'); }
}

// ── 일지 뷰어 라우터 ───────────────────────────────────
function viewRecord(recordId, logId, title) {
  openModal('📋 ' + title,
    '<div style="text-align:center;padding:20px;"><div class="spinner" style="margin:0 auto;"></div>' +
    '<p style="color:#999;margin-top:10px;">불러오는 중...</p></div>',
    true);

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) {
        document.getElementById('modal-body').innerHTML = '<p style="color:red;">불러오기 실패: ' + res.message + '</p>';
        return;
      }
      var rec = state.records.find(function(r) { return r.recordId === recordId; });
      var html = '';

      if (rec && rec.logId === 'si0102hs' && typeof buildSi0102hsViewHtml === 'function') {
        html = buildSi0102hsViewHtml(rec, res.dataJson, title, res);
      } else if (rec && rec.logId === 'si0102dr' && typeof buildSi0102drViewHtml === 'function') {
        html = buildSi0102drViewHtml(rec, res.dataJson, title, res);
      } else if (rec && rec.logId === 'si0102wc' && typeof buildSi0102wcViewHtml === 'function') {
        html = buildSi0102wcViewHtml(rec, res.dataJson, title, res);
      } else if (rec && rec.logId === 'si0201' && typeof buildSi0201ViewHtml === 'function') {
        html = buildSi0201ViewHtml(rec, res.dataJson, title, res);
      } else {
        html = buildGenericViewHtml(rec, res.dataJson, title, res);
      }
      document.getElementById('modal-body').innerHTML = html;
    })
    .withFailureHandler(function() {
      document.getElementById('modal-body').innerHTML = '<p style="color:red;">불러오기 실패</p>';
    })
    .getRecordDetail(recordId, logId);
}

window.viewRecord = viewRecord;

/**
 * 결재란 HTML 생성 공통 헬퍼
 * - 검토자 없으면 검토 칸 숨김
 * - 가로 한 줄 배치
 * - 각 칸: 역할명 / 이름 / 서명 / 날짜
 */
function buildSigRowHtml(rec, sigRes) {
  // 서버에서 가져온 서명 우선, 없으면 현재 로그인 사용자 서명 (본인 문서일 때)
  var writerSig   = (sigRes && sigRes.writerSignature)
    ? sigRes.writerSignature
    : (state.user.signature && rec.writerId === state.user.id ? state.user.signature : '');
  var reviewerSig = (sigRes && sigRes.reviewerSignature) ? sigRes.reviewerSignature : '';
  var approverSig = (sigRes && sigRes.approverSignature) ? sigRes.approverSignature : '';

  var hasReviewer = rec.reviewer && rec.reviewer !== '' && rec.reviewer !== '-';
  var hasApprover = rec.approver && rec.approver !== '' && rec.approver !== '-';

  // 직책 있으면 직책, 없으면 계급, 둘 다 없으면 기본 역할명
  var writerLabel   = (sigRes && sigRes.writerTitle)   || state.user.title || state.user.rank || '작성';
  var reviewerLabel = (sigRes && sigRes.reviewerTitle) || '검토';
  var approverLabel = (sigRes && sigRes.approverTitle) || '승인';

  function sigBox(roleLabel, name, sigSrc, date) {
    var sigContent = sigSrc
      ? '<img src="' + sigSrc + '" style="max-width:100%;max-height:55px;object-fit:contain;" alt="서명" onerror="this.style.display=\'none\'">'
      : '<span style="color:#ccc;font-size:11px;">서명없음</span>';
    return (
      '<div class="sig-box">' +
        '<div class="sig-box-role">' + roleLabel + '</div>' +
        '<div class="sig-box-name">' + (name || '-') + '</div>' +
        '<div class="sig-box-img">' + sigContent + '</div>' +
        '<div class="sig-box-date">' + (date || '') + '</div>' +
      '</div>'
    );
  }

  var html = '<div class="sig-row-wrap">';
  html += sigBox(writerLabel, rec.writerName, writerSig, rec.date);
  if (hasReviewer) html += sigBox(reviewerLabel, rec.reviewer, reviewerSig, rec.date);
  html += sigBox(approverLabel, hasApprover ? rec.approver : '-', hasApprover ? approverSig : '', hasApprover ? rec.date : '');
  html += '</div>';

  return html;
}

/**
 * 기본 위생점검 뷰어 HTML 생성
 */
function buildGenericViewHtml(rec, dataJsonStr, title, sigRes) {
  var data = {};
  try { data = JSON.parse(dataJsonStr); } catch (e) {}
  if (!data || !data.items) {
    return '<p style="color:#999;text-align:center;padding:20px;">작성된 내용이 없습니다.</p>';
  }

  var itemsHtml = CHECK_ITEMS.map(function(item) {
    var d          = data.items[item.key] || {};
    var resultHtml = d.result === 'ok'
      ? '<span class="result-ok">✔ 적합</span>'
      : '<span class="result-ng">✘ 부적합</span>';
    var photoHtml = '';
    if (d.result === 'ng') {
      var defImg = d.defectPhoto ? '<br><img src="' + d.defectPhoto + '" style="max-width:120px;border-radius:6px;margin-top:4px;" onerror="this.style.display=\'none\'">' : '';
      var actImg = d.actionPhoto ? '<br><img src="' + d.actionPhoto + '" style="max-width:120px;border-radius:6px;margin-top:4px;" onerror="this.style.display=\'none\'">' : '';
      photoHtml =
        '<br><span style="font-size:11px;color:#c0392b;">부적합: ' + (d.defectText || '-') + '</span>' + defImg +
        '<br><span style="font-size:11px;color:#27ae60;">조치: '   + (d.actionText  || '-') + '</span>' + actImg;
    }
    return '<tr><td style="text-align:left;padding-left:10px;">' + item.label + '</td><td>' + resultHtml + photoHtml + '</td></tr>';
  }).join('');

  return '<div class="view-form-wrap">' +
    '<table class="view-header-table">' +
      '<tr><td class="label">문서명</td><td>' + title + '</td><td class="label">점검일</td><td>' + (rec.date || '-') + '</td></tr>' +
      '<tr><td class="label">점검자</td><td>' + (rec.writerName || '-') + '</td><td class="label">온도</td><td>' + (data.temperature || '-') + ' ℃</td></tr>' +
    '</table>' +
    '<table class="view-check-table">' +
      '<tr><th style="width:55%">점검 항목</th><th>결과</th></tr>' +
      itemsHtml +
    '</table>' +
    (data.memo ? '<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:10px;margin-bottom:15px;font-size:13px;"><strong>특이사항:</strong> ' + data.memo + '</div>' : '') +
    buildSigRowHtml(rec, sigRes) +
    '</div>';
}
</script>
