<script>
// ════════════════════════════════════════════════════════
//  js_ui.html — 모달 / 서명 / 배치처리 / 관리자 기능
// ════════════════════════════════════════════════════════

// ── 모달 ───────────────────────────────────────────────
function openModal(title, body, showClose) {
  document.getElementById('modal-title').innerText   = title;
  document.getElementById('modal-body').innerHTML    = body;
  document.getElementById('modal-close').style.display = showClose ? 'block' : 'none';
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

// ── 내 정보 / 비밀번호 변경 ─────────────────────────────
function openMyInfo() {
  var roles    = state.user.factoryRoles    || {};
  var deputies = state.user.factoryDeputies || {};
  var roleNames = { '1': '작성자', '2': '검토자', '3': 'HACCP팀장' };
  var roleLines = state.factories.map(function(f) {
    var r = roles[f.id];
    if (!r) return null;
    var label = deputies[f.id] !== undefined ? 'HACCP팀장 대행' : (roleNames[String(r)] || r + '등급');
    return '<li>' + f.name + ': ' + label + '</li>';
  }).filter(Boolean).join('');

  openModal('내 정보',
    '<p><strong>이름:</strong> ' + state.user.name + '</p>' +
    '<p><strong>계급:</strong> ' + (state.user.rank || '-') + '</p>' +
    '<p><strong>공장별 권한:</strong></p>' +
    '<ul style="margin:5px 0 10px 20px;padding:0;">' + (roleLines || '<li>없음</li>') + '</ul><hr>' +
    '<button onclick="showChangePw()" class="btn-primary" style="margin-bottom:10px;padding:10px;">비밀번호 변경</button><br>' +
    '<button onclick="forceSignature(true)" class="btn-primary" style="padding:10px;">전자서명 재등록</button>',
    true);
}

function showChangePw() {
  openModal('비밀번호 변경',
    '<input type="password" id="new-pw"      class="input-field" placeholder="새 비밀번호">' +
    '<input type="password" id="new-pw-conf" class="input-field" placeholder="비밀번호 확인">' +
    '<button onclick="submitNewPw()" class="btn-primary">변경 완료</button>',
    true);
}

function forceChangePassword() {
  openModal('비밀번호 변경 필요',
    '<input type="password" id="new-pw"      class="input-field" placeholder="새 비밀번호">' +
    '<input type="password" id="new-pw-conf" class="input-field" placeholder="비밀번호 확인">' +
    '<button onclick="submitNewPw()" class="btn-primary">변경 완료</button>',
    false);
}

function submitNewPw() {
  var newPw = document.getElementById('new-pw').value;
  var conf  = document.getElementById('new-pw-conf').value;
  if (newPw.length < 4 || newPw !== conf) {
    alert('비밀번호가 4자 미만이거나 일치하지 않습니다.');
    return;
  }
  showLoading('변경 중...');
  google.script.run
    .withSuccessHandler(function() {
      hideLoading();
      closeModal();
      alert('변경 완료! 다시 로그인하세요.');
      handleLogout();
    })
    .updatePassword(state.user.id, newPw);
}

// ── 전자서명 ───────────────────────────────────────────
function forceSignature(canClose) {
  openModal('✍️ 전자서명 등록',
    '<p style="font-size:12px;color:#888;margin:0 0 10px;">아래 박스 안에 서명해주세요.</p>' +
    '<div class="sig-canvas-wrap">' +
      '<div class="sig-guide-lines"></div>' +
      '<canvas id="sig-canvas"></canvas>' +
    '</div>' +
    '<div style="display:flex;gap:10px;margin-top:14px;">' +
      '<button onclick="clearSigCanvas()" class="sig-btn sig-btn-clear">↺ 다시 그리기</button>' +
      '<button onclick="submitSignature()" class="sig-btn sig-btn-save">✔ 서명 저장</button>' +
    '</div>',
    canClose || false);
  setTimeout(initSigCanvas, 100);
}

function initSigCanvas() {
  canvas = document.getElementById('sig-canvas');
  if (!canvas) return;
  ctx           = canvas.getContext('2d');
  canvas.width  = canvas.offsetWidth;
  canvas.height = 180;

  canvas.onmousedown  = function(e) { sigDrawing = true;  sigDraw(e); };
  canvas.onmouseup    = function()  { sigDrawing = false; ctx.beginPath(); };
  canvas.onmousemove  = function(e) { sigDraw(e); };
  canvas.ontouchstart = function(e) { e.preventDefault(); sigDrawing = true;  sigDraw(e.touches[0]); };
  canvas.ontouchend   = function()  { sigDrawing = false; ctx.beginPath(); };
  canvas.ontouchmove  = function(e) { e.preventDefault(); sigDraw(e.touches[0]); };
}

function sigDraw(e) {
  if (!sigDrawing) return;
  var rect = canvas.getBoundingClientRect();
  ctx.lineWidth = 3;
  ctx.lineCap   = 'round';
  ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
  ctx.stroke();
}

function clearSigCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
}

function submitSignature() {
  var sigData = canvas.toDataURL('image/png');
  showLoading('저장 중...');
  google.script.run
    .withSuccessHandler(function() {
      state.user.signature = sigData;
      sessionStorage.setItem('haccp_user', JSON.stringify(state.user));
      closeModal();
      loginSuccess(state.user);
    })
    .saveSignature(state.user.id, sigData);
}

// ── 롱프레스 / 선택 모드 ────────────────────────────────
function startPress(e, actionType) {
  pressTimer = setTimeout(function() {
    if (actionType === 'WRITE')       { return; } // 작성탭 자동 일괄작성 비활성화
    if (actionType === 'REVIEW') {
      if (getCurrentRole() >= 3) { executeBatchProcess('APPROVE'); return; }
      executeBatchProcess('REVIEW');
      return;
    }
    if (actionType === 'APPROVE')     { executeBatchProcess('APPROVE');return; }
    if (actionType === 'SELECT_MODE') {
      if (getCurrentRole() < 3) return;
      state.selectMode = true; state.revokeMode = false;
      document.getElementById('batch-revoke-btn').style.display  = 'none';
      document.getElementById('batch-approve-btn').style.display = '';
      document.getElementById('selection-bar').classList.remove('hidden');
      renderDoneList();
    }
    if (actionType === 'REVOKE_MODE') {
      if (getCurrentRole() < 3) return;
      state.selectMode = true; state.revokeMode = true;
      document.getElementById('batch-revoke-btn').style.display  = '';
      document.getElementById('batch-approve-btn').style.display = 'none';
      document.getElementById('selection-bar').classList.remove('hidden');
      renderDoneList();
    }
  }, 1500);
}

function cancelPress() { clearTimeout(pressTimer); pressTimer = null; }

function closeSelectMode() {
  state.selectMode = false;
  state.revokeMode = false;
  document.getElementById('selection-bar').classList.add('hidden');
  renderDoneList();
}

// ③ 전체선택 토글
function toggleSelectAll() {
  var checkboxes = document.querySelectorAll('.card-check');
  var allChecked = Array.from(checkboxes).every(function(cb) { return cb.checked; });
  checkboxes.forEach(function(cb) { cb.checked = !allChecked; });
  updateCount();
  // 버튼 라벨 토글
  var btn = document.getElementById('select-all-btn');
  if (btn) btn.innerText = allChecked ? '전체선택' : '전체해제';
}

function updateCount() {
  document.getElementById('selected-count').innerText =
    document.querySelectorAll('.card-check:checked').length + '개 선택됨';
}

// ── 일괄 처리 ──────────────────────────────────────────
function executeBatchApprove() {
  var ids = Array.from(document.querySelectorAll('.card-check:checked')).map(function(cb) { return cb.dataset.id; });
  if (!ids.length) { alert('선택된 일지가 없습니다.'); return; }
  if (!confirm(ids.length + '개를 일괄승인하시겠습니까?')) return;
  ids.forEach(function(id) { showCardLoading(id); });
  showLoading('처리 중...');
  google.script.run
    .withSuccessHandler(function() {
      closeSelectMode();
      showToast('일괄승인 완료!', 'success');
      refreshRecordsBackground();
      hideLoading();
    })
    .withFailureHandler(function(e) {
      ids.forEach(function(id) { hideCardLoading(id); });
      hideLoading();
      alert('일괄승인 실패: ' + (e && e.message ? e.message : '서버 오류'));
    })
    .batchActionByIds(ids, 'APPROVE', state.user.name, String(getCurrentRole()));
}

function executeBatchRevoke() {
  var ids = Array.from(document.querySelectorAll('.card-check:checked')).map(function(cb) { return cb.dataset.id; });
  if (!ids.length) { alert('선택된 일지가 없습니다.'); return; }
  if (!confirm(ids.length + '개의 승인을 취소하시겠습니까?')) return;
  ids.forEach(function(id) { showCardLoading(id); });
  showLoading('처리 중...');
  google.script.run
    .withSuccessHandler(function() {
      closeSelectMode();
      showToast('승인취소 완료!', 'info');
      refreshRecordsBackground();
      hideLoading();
    })
    .withFailureHandler(function(e) {
      ids.forEach(function(id) { hideCardLoading(id); });
      hideLoading();
      alert('승인취소 실패: ' + (e && e.message ? e.message : '서버 오류'));
    })
    .batchActionByIds(ids, 'REVOKE', state.user.name, String(getCurrentRole()));
}

function executeBatchWrite() {
  executeTodayCreateBatch();
}

/**
 * 오늘 일간 일지 일괄 생성 모달 열기
 */
function executeTodayCreateBatch() {
  var factoryId = state.currentFactory || 'pb2';
  var todayStr  = state.serverToday;

  var dailyLogs = (state.logs || []).filter(function(l) {
    return (l.factoryId || 'pb2') === factoryId && String(l.interval) === '일간';
  });
  if (!dailyLogs.length) { showToast('등록된 일간 일지가 없습니다.', 'info'); return; }

  var dailyLogIds     = dailyLogs.map(function(l) { return l.id; });
  var existingLogIds  = (state.records || [])
    .filter(function(r) {
      return r.date === todayStr && (r.factoryId || 'pb2') === factoryId && dailyLogIds.indexOf(r.logId) !== -1;
    })
    .map(function(r) { return r.logId; });

  var listHtml = '<div style="border:1px solid #eee;border-radius:10px;overflow:hidden;max-height:52vh;overflow-y:auto;">';
  dailyLogs.forEach(function(log, idx) {
    var isExisting = existingLogIds.indexOf(log.id) !== -1;
    var border = idx > 0 ? 'border-top:1px solid #f0f0f0;' : '';
    var badge  = isExisting
      ? '<span style="margin-left:auto;font-size:10px;padding:2px 7px;border-radius:10px;background:#fff3cd;color:#856404;white-space:nowrap;">이미 존재</span>'
      : '<span style="margin-left:auto;font-size:10px;padding:2px 7px;border-radius:10px;background:#d4edda;color:#155724;white-space:nowrap;">신규</span>';
    listHtml +=
      '<label style="display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;' + border + '">' +
        '<input type="checkbox" class="today-log-check" data-id="' + log.id + '" data-existing="' + isExisting + '" ' +
          'style="width:18px;height:18px;cursor:pointer;"' + (isExisting ? '' : ' checked') + '>' +
        '<span style="font-size:14px;">' + log.title + '</span>' +
        badge +
      '</label>';
  });
  listHtml += '</div>';

  var html =
    '<p style="font-size:12px;color:#666;margin:0 0 10px;">오늘(' + todayStr + ') 기준으로 생성할 일지를 선택하세요.</p>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
      '<span style="font-size:12px;color:#666;">일간 일지 ' + dailyLogs.length + '건 / 기존 ' + existingLogIds.length + '건</span>' +
      '<button onclick="toggleTodaySelectAll()" id="today-select-all-btn" ' +
        'style="font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #ddd;background:white;cursor:pointer;">전체선택</button>' +
    '</div>' +
    listHtml +
    '<div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">' +
      '<button onclick="closeModal()" style="padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;">취소</button>' +
      '<button onclick="doTodayCreateBatch()" class="btn-primary">✔ 생성</button>' +
    '</div>';

  openModal('📋 오늘 일지 일괄 생성', html, true);
}

function toggleTodaySelectAll() {
  var checkboxes = document.querySelectorAll('.today-log-check');
  var allChecked = Array.from(checkboxes).every(function(cb) { return cb.checked; });
  checkboxes.forEach(function(cb) { cb.checked = !allChecked; });
  var btn = document.getElementById('today-select-all-btn');
  if (btn) btn.innerText = allChecked ? '전체선택' : '전체해제';
}

function doTodayCreateBatch() {
  var checked = document.querySelectorAll('.today-log-check:checked');
  if (!checked.length) { showToast('생성할 일지를 선택해주세요.', 'error'); return; }

  var factoryId   = state.currentFactory || 'pb2';
  var selectedIds = [];
  var forceIds    = [];
  Array.from(checked).forEach(function(cb) {
    selectedIds.push(cb.dataset.id);
    if (cb.dataset.existing === 'true') forceIds.push(cb.dataset.id);
  });

  if (forceIds.length > 0 && !confirm('⚠️ 이미 존재하는 일지 ' + forceIds.length + '건도 중복 생성됩니다.\n계속하시겠습니까?')) return;

  closeModal();
  showLoading('생성 중...');
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoading();
      if (!res || !res.success) { showToast('생성 실패', 'error'); return; }
      showToast(selectedIds.length + '건 생성 완료', 'success');
      refreshRecordsBackground(function() { switchTab('todo'); });
    })
    .withFailureHandler(function(e) {
      hideLoading();
      alert('일지 생성 실패: ' + (e && e.message ? e.message : '서버 오류'));
    })
    .createTodayDailyLogsBatch(factoryId, '', '', forceIds, selectedIds);
}

function executeBatchProcess(action) {
  var role = getCurrentRole();
  if (action === 'REVIEW'  && role < 2) { alert('검토 권한 없음'); return; }
  if (action === 'APPROVE' && role < 3) { alert('승인 권한 없음'); return; }

  // 화면에 보이는 전체 대기 대상 카드에 로딩 표시 (날짜 무관)
  var targetIds = state.records
    .filter(function(r) {
      if (action === 'REVIEW') return r.status === '작성완료';
      if (action === 'APPROVE') return r.status === '검토완료' || r.status === '작성완료';
      return false;
    })
    .map(function(r) { return r.recordId; });
  if (!targetIds.length) {
    showToast('처리할 대상이 없습니다.', 'info');
    return;
  }

  var name = action === 'REVIEW' ? '검토완료' : '승인완료';
  if (!confirm('대기 문서를 일괄 [' + name + '] 처리하시겠습니까?')) return;
  targetIds.forEach(function(id) { showCardLoading(id); });
  showLoading('처리 중...');
  google.script.run
    .withSuccessHandler(function() {
      showToast('일괄 ' + name + '!', 'success');
      refreshRecordsBackground();
      hideLoading();
    })
    .withFailureHandler(function(e) {
      targetIds.forEach(function(id) { hideCardLoading(id); });
      hideLoading();
      alert('일괄 ' + name + ' 실패: ' + (e && e.message ? e.message : '서버 오류'));
    })
    .batchProcessRecords(action, state.user.name, String(getCurrentRole()));
}

// ── 사용자 관리 ────────────────────────────────────────
var _umUsers    = [];   // 사용자 목록 캐시
var _umFactories = [];  // 공장 목록 캐시
var _umIsMaster = false;

function openUserManagement() {
  openModal('👥 사용자 관리', '<p style="text-align:center;padding:20px;color:#888;">불러오는 중...</p>', true);
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) { alert(res.message || '오류'); return; }
      _umUsers     = res.users;
      _umFactories = res.factories;
      _umIsMaster  = res.requesterIsMaster;
      renderUserManagement();
    })
    .withFailureHandler(function(e) { alert('오류: ' + e.message); })
    .getUserList(state.user.id);
}

function renderUserManagement() {
  var html =
    '<div style="margin-bottom:12px;font-size:12px;color:#888;">' +
      '총 ' + _umUsers.length + '명 · ' + (_umIsMaster ? '마스터' : '팀장') + ' 권한으로 조회 중' +
    '</div>' +
    '<div id="um-list" style="display:flex;flex-direction:column;gap:10px;">';

  _umUsers.forEach(function(u, idx) {
    html += buildUserCard(u, idx);
  });

  html += '</div>';
  document.getElementById('modal-body').innerHTML = html;
  // 목록 상태에서 X는 모달 닫기
  document.getElementById('modal-close').onclick = function() { closeModal(); };
}

function buildUserCard(u, idx) {
  var rankOpts = ['', '사원', '주임', '대리', '과장', '차장', '부장'].map(function(r) {
    return '<option value="' + r + '"' + (u.rank === r ? ' selected' : '') + '>' + (r || '(선택)') + '</option>';
  }).join('');

  var factoryHtml = _umFactories.map(function(f) {
    // 팀장은 자기 공장만 수정 가능, 마스터는 전체
    var myRole = state.user.factoryRoles ? parseInt(state.user.factoryRoles[f.id] || 0) : 0;
    var canEdit = _umIsMaster || myRole === 3;
    var cur = parseInt((u.factoryRoles || {})[f.id] || 0);
    var deputy = (u.factoryDeputies || {})[f.id];
    var isLeader = cur === 3;
    var isDeputy = deputy ? true : false;
    
    var roleOpts = [0,1,2,3].map(function(r) {
      var labels = ['없음','작성자','검토자','팀장'];
      return '<option value="'+r+'"'+(cur===r?' selected':'')+'>'+labels[r]+'</option>';
    }).join('');

    return '<div class="um-factory-row" style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">' +
      '<span style="font-size:12px;color:#555;width:80px;flex-shrink:0;">' + f.name + '</span>' +
      '<div class="um-factory-controls" style="flex:1;display:flex;align-items:center;gap:8px;">' +
        (isDeputy
          ? '<span class="um-role-label" style="font-size:12px;color:#e67e22;padding:6px 10px;border:1px solid #e67e22;border-radius:8px;">HACCP팀장 대행</span>'
          : '<select class="um-factory-role" data-fid="' + f.id + '" style="flex:1;font-size:12px;padding:6px 8px;border:1px solid #ddd;border-radius:8px;">' + roleOpts + '</select>'
        ) +
        (canEdit && isLeader && !isDeputy
          ? '<button type="button" class="um-deputy-btn" data-fid="' + f.id + '" data-leader="true" onclick="toggleDeputyRole(this)" style="padding:7px 12px;border-radius:8px;border:1px solid #3498db;background:white;color:#3498db;font-size:12px;cursor:pointer;">대행 지정</button>'
          : (canEdit && isDeputy
            ? '<button type="button" class="um-deputy-btn" data-fid="' + f.id + '" data-leader="true" onclick="toggleDeputyRole(this)" style="padding:7px 12px;border-radius:8px;border:1px solid #e74c3c;background:#e74c3c;color:white;font-size:12px;cursor:pointer;">대행 해제</button>'
            : ''
          )
        ) +
      '</div>' +
    '</div>';
  }).join('');

  var masterHtml = _umIsMaster
    ? '<div style="display:flex;align-items:center;gap:8px;margin-top:4px;">' +
        '<label style="font-size:12px;color:#555;">마스터 계정</label>' +
        '<input type="checkbox" class="um-is-master"' + (u.isMaster ? ' checked' : '') + ' style="width:16px;height:16px;">' +
      '</div>'
    : '';

  return '<div style="border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;cursor:pointer;" ' +
    'onclick="editUserCard(\'' + u.id + '\')">' +
    // 헤더 (클릭 시 편집 모달)
    '<div style="display:flex;align-items:center;padding:12px 14px;background:#fafafa;">' +
      '<div style="flex:1;">' +
        '<div style="font-size:14px;font-weight:600;">' + u.name + '</div>' +
        '<div style="font-size:11px;color:#999;margin-top:2px;">' + u.id +
          (u.rank ? ' · ' + u.rank : '') +
          (u.isMaster ? ' · <span style="color:#8e44ad;">마스터</span>' : '') +
        '</div>' +
      '</div>' +
      '<span style="font-size:18px;color:#aaa;">✎</span>' +
    '</div>' +
  '</div>';
}

function toggleDeputyRole(btn) {
  var row = btn.closest('.um-factory-row');
  if (!row) return;
  var select = row.querySelector('.um-factory-role');
  var label  = row.querySelector('.um-role-label');
  var isLeader = btn.dataset.leader === 'true';

  if (isLeader) {
    // 대행 활성화 → 드롭다운 숨기고 label 표시
    btn.dataset.leader = 'true';
    btn.textContent = '대행 해제';
    btn.style.background = '#e74c3c';
    btn.style.color = 'white';
    if (select) {
      select.style.display = 'none';
    }
    if (!label) {
      label = document.createElement('span');
      label.className = 'um-role-label';
      label.innerText = 'HACCP팀장 대행';
      label.style.cssText = 'font-size:12px;color:#e67e22;padding:6px 10px;border:1px solid #e67e22;border-radius:8px;';
      row.querySelector('.um-factory-controls').insertBefore(label, btn);
    }
  } else {
    // 대행 해제 → 드롭다운 표시하고 label 제거
    btn.data.leader = 'false';
    btn.textContent = '대행 지정';
    btn.style.background = 'white';
    btn.style.color = '#3498db';
    if (select) {
      select.style.display = 'inline-block';
    }
    if (label) label.remove();
  }
}

function toggleUmCard(header) {
  var body  = header.nextElementSibling;
  var arrow = header.querySelector('span:last-child');
  var open  = body.style.display !== 'none';
  body.style.display  = open ? 'none' : 'block';
  arrow.style.transform = open ? '' : 'rotate(90deg)';
}

function editUserCard(userId) {
  var user = _umUsers.find(function(u) { return u.id === userId; });
  if (!user) return;

  var rankOpts = ['', '사원', '주임', '대리', '과장', '차장', '부장'].map(function(r) {
    return '<option value="' + r + '"' + (user.rank === r ? ' selected' : '') + '>' + (r || '(선택)') + '</option>';
  }).join('');

  var factoryHtml = _umFactories.map(function(f) {
    var myRole  = state.user.factoryRoles ? parseInt(state.user.factoryRoles[f.id] || 0) : 0;
    var canEdit = _umIsMaster || myRole === 3;
    var cur     = parseInt((user.factoryRoles || {})[f.id] || 0);
    var isDeputy = (user.factoryDeputies || {})[f.id] !== undefined;
    var curVal  = isDeputy ? 'dep' : String(cur);

    var roleOpts = [
      { val: '0',   label: '없음'    },
      { val: '1',   label: '작성자'  },
      { val: '2',   label: '검토자'  },
      { val: '3',   label: '팀장'    },
      { val: 'dep', label: '팀장대행' }
    ].map(function(opt) {
      var selected = curVal === opt.val ? ' selected' : '';
      // 자기 자신은 팀장/팀장대행 선택 불가 (마스터 제외)
      var disabled = (opt.val === '3' || opt.val === 'dep') && user.id === state.user.id && !_umIsMaster ? ' disabled' : '';
      return '<option value="' + opt.val + '"' + selected + disabled + '>' + opt.label + '</option>';
    }).join('');

    var selectHtml = canEdit
      ? '<select class="um-factory-role" data-fid="' + f.id + '" style="flex:1;font-size:12px;padding:6px 8px;border:1px solid #ddd;border-radius:8px;">' + roleOpts + '</select>'
      : '<span style="font-size:12px;color:#555;padding:6px 10px;border:1px solid #eee;border-radius:8px;background:#f9f9f9;">' +
          ({ '0':'없음','1':'작성자','2':'검토자','3':'팀장','dep':'팀장대행' }[curVal] || curVal) +
        '</span>';

    return '<div class="um-factory-row" style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">' +
      '<span style="font-size:12px;color:#555;width:80px;flex-shrink:0;">' + f.name + '</span>' +
      '<div style="flex:1;">' + selectHtml + '</div>' +
    '</div>';
  }).join('');

  var masterHtml = _umIsMaster
    ? '<div style="display:flex;align-items:center;gap:8px;margin-top:4px;">' +
        '<label style="font-size:12px;color:#555;">마스터 계정</label>' +
        '<input type="checkbox" class="um-is-master"' + (user.isMaster ? ' checked' : '') + ' style="width:16px;height:16px;">' +
      '</div>'
    : '';

  var html =
    '<div style="display:flex;gap:10px;margin-bottom:10px;">' +
      '<div style="flex:1;">' +
        '<label style="font-size:11px;color:#888;display:block;margin-bottom:3px;">계급</label>' +
        '<select class="um-rank" style="width:100%;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:8px;">' + rankOpts + '</select>' +
      '</div>' +
    '</div>' +
    '<div style="margin-bottom:10px;">' +
      '<label style="font-size:11px;color:#888;display:block;margin-bottom:6px;">공장별 권한</label>' +
      factoryHtml +
    '</div>' +
    masterHtml +
    '<button id="um-save-btn" onclick="saveUserCard(this, \'' + userId + '\')" ' +
      'style="width:100%;margin-top:10px;padding:10px;border-radius:8px;border:none;background:#3498db;color:#fff;font-size:14px;font-weight:600;cursor:pointer;">' +
      '저장' +
    '</button>';

  var title = user.name + ' (' + user.id + ')' + (user.rank ? ' · ' + user.rank : '');
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-title').innerText = '👤 ' + title;
  // X 버튼 → 사용자관리 목록으로 복귀
  var closeBtn = document.getElementById('modal-close');
  closeBtn.style.display = 'block';
  closeBtn.onclick = function() {
    closeBtn.onclick = function() { closeModal(); }; // 목록 상태로 복원
    renderUserManagement();
  };
  document.getElementById('modal').classList.remove('hidden');
}

function saveUserCard(btn, targetId) {
  var body = document.getElementById('modal-body'); // fix: btn.closest('.um-body') → modal-body

  var newRank = body.querySelector('.um-rank').value;

  // 공장별 권한 ("dep" 값 포함해서 그대로 서버로 전달)
  var newRoles = {};
  body.querySelectorAll('.um-factory-role').forEach(function(sel) {
    var v = sel.value;
    if (v !== '0') newRoles[sel.dataset.fid] = v; // "dep" 또는 숫자 문자열
  });

  // 마스터 토글
  var masterCheck = body.querySelector('.um-is-master');
  var newIsMaster = masterCheck ? masterCheck.checked : undefined;

  var prevUser = _umUsers.find(function(u){ return u.id === targetId; });
  var updates = {
    rank:         newRank,
    factoryRoles: newRoles
  };
  if (newIsMaster !== undefined) updates.isMaster = newIsMaster;

  btn.disabled    = true;
  btn.textContent = '저장 중...';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) { alert(res.message || '저장 실패'); btn.disabled = false; btn.textContent = '저장'; return; }
      showToast(prevUser ? prevUser.name + ' 저장 완료' : '저장 완료', 'success');
      // 서버 반영 후 목록 새로고침 (캐시 갱신)
      openUserManagement();
    })
    .withFailureHandler(function(e) {
      alert('오류: ' + e.message);
      btn.disabled = false; btn.textContent = '저장';
    })
    .updateUserInfo(state.user.id, targetId, updates);
}

// ── 관리자 기능 ────────────────────────────────────────
function runTestDataSetup() {

  showLoading('세팅 중...');
  google.script.run

// ⑤ 사후작성 — 날짜 선택 시 미작성 일지 목록 표시, 체크 선택 후 일괄생성
function openPostWriter() {
  openModal('🗂 사후 작성 생성',
    '<p style="font-size:12px;color:#e74c3c;margin:0 0 12px;">* 관리자 전용: 과거 날짜 일지 생성</p>' +
    '<div style="margin-bottom:12px;">' +
      '<label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">날짜 선택</label>' +
      '<input type="date" id="post-date" class="input-field" style="margin:0;" value="' + state.serverToday + '" onchange="loadPostWriterLogs()">' +
    '</div>' +
    '<div id="post-log-list" style="margin-bottom:12px;"></div>' +
    '<button onclick="executePostCreateBatch()" class="btn-primary" style="background:var(--success);">✔ 선택 일지 생성</button>',
    true);

  // 모달 열리자마자 오늘 날짜 기준으로 목록 로드
  setTimeout(loadPostWriterLogs, 100);
}

/**
 * 선택한 날짜의 미작성 일지 목록을 모달 안에 렌더링
 */
function loadPostWriterLogs() {
  var dateEl = document.getElementById('post-date');
  var listEl = document.getElementById('post-log-list');
  if (!dateEl || !listEl) return;

  var selectedDate = dateEl.value;
  if (!selectedDate) { listEl.innerHTML = ''; return; }

  // 해당 날짜에 이미 생성/작성된 logId 목록 (작성중 포함, 중복 생성 방지)
  // 현재 선택 공장 기준으로만 계산
  var currentFactory = state.currentFactory || 'pb2';
  var doneLogIds = state.records
    .filter(function(r) { return r.date === selectedDate && (r.factoryId || 'pb2') === currentFactory; })
    .map(function(r) { return r.logId; });

  // 현재 공장에 속한 일지만 대상으로
  var pending = state.logs
    .filter(function(l) { return (l.factoryId || 'pb2') === currentFactory; })
    .filter(function(l) { return !doneLogIds.includes(l.id); });

  if (!pending.length) {
    listEl.innerHTML = '<p style="color:#27ae60;font-size:13px;text-align:center;padding:10px;">✅ 모든 일지가 작성되어 있습니다.</p>';
    return;
  }

  var html =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
      '<span style="font-size:12px;color:#666;">미작성 일지 ' + pending.length + '건</span>' +
      '<button onclick="togglePostSelectAll()" id="post-select-all-btn" ' +
        'style="font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #ddd;background:white;cursor:pointer;">전체선택</button>' +
    '</div>' +
    '<div style="border:1px solid #eee;border-radius:10px;overflow:hidden;">';

  pending.forEach(function(log, idx) {
    var borderTop = idx > 0 ? 'border-top:1px solid #f0f0f0;' : '';
    html +=
      '<label style="display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;' + borderTop + '">' +
        '<input type="checkbox" class="post-log-check" data-id="' + log.id + '" data-title="' + log.title + '" ' +
          'style="width:18px;height:18px;cursor:pointer;" checked>' +
        '<span style="font-size:14px;">' + log.title + '</span>' +
        '<span style="margin-left:auto;font-size:11px;color:#aaa;">' + log.interval + '</span>' +
      '</label>';
  });

  html += '</div>';
  listEl.innerHTML = html;
}

/**
 * 사후작성 전체선택 토글
 */
function togglePostSelectAll() {
  var checkboxes = document.querySelectorAll('.post-log-check');
  var allChecked = Array.from(checkboxes).every(function(cb) { return cb.checked; });
  checkboxes.forEach(function(cb) { cb.checked = !allChecked; });
  var btn = document.getElementById('post-select-all-btn');
  if (btn) btn.innerText = allChecked ? '전체선택' : '전체해제';
}

/**
 * 선택된 일지 일괄 생성
 */
function executePostCreateBatch() {
  var date      = document.getElementById('post-date').value;
  var checked   = document.querySelectorAll('.post-log-check:checked');
  if (!date)           { showToast('날짜를 선택해주세요.', 'error'); return; }
  if (!checked.length) { showToast('생성할 일지를 선택해주세요.', 'error'); return; }

  var currentFactory = state.currentFactory || 'pb2';
  var targets = Array.from(checked).map(function(cb) {
    return { logId: cb.dataset.id, title: cb.dataset.title };
  });

  if (!confirm(date + ' / ' + targets.length + '건을 생성하시겠습니까?')) return;

  closeModal();
  showLoading('생성 중... (0/' + targets.length + ')');

  var created = 0;
  (function next(idx) {
    if (idx >= targets.length) {
      showToast(targets.length + '건 생성 완료!', 'success');
      // 공장선택으로 튀지 않도록 전체 재로그인(loadData/checkSession) 대신 records만 갱신
      refreshRecordsBackground(function() {
        hideLoading();
        switchTab('todo');
      });
      return;
    }
    var t = targets[idx];
    google.script.run
      .withSuccessHandler(function() {
        created++;
        document.getElementById('loading-msg').innerText = '생성 중... (' + created + '/' + targets.length + ')';
        next(idx + 1);
      })
      .withFailureHandler(function() {
        showToast(t.title + ' 생성 실패', 'error');
        next(idx + 1);
      })
      // 요청사항: 사후작성 생성본은 작성자/작성ID를 비워서 생성
      .createNewLog(t.logId, t.title, '', '', date, currentFactory);
  })(0);
}
